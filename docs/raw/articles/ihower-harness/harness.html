<h2 id="%E8%A4%87%E7%BF%92-agent-10-%E8%BF%B4%E5%9C%88">複習 Agent 1.0 迴圈</h2>
<p><img src="agent-loop.jpg" alt="Agent 迴圈: Input → LLM 挑選工具 → Tools → 執行得到 Tool Result → 觀察結果回到 LLM，呼叫工具 N 次後輸出 Output" style="width:980px;" /></p>
<div class="small center gap-sm">呼叫工具 N 次、每次都把結果讀回來，直到沒有工具要呼叫才輸出</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="agent-20-deep-agent-%E7%9A%84%E5%85%AD%E9%A0%85%E8%83%BD%E5%8A%9B">Agent 2.0 (Deep Agent) 的六項能力</h2>
<p>這些能力讓 Agent 應付更大更複雜的任務，技術上都是用到 <strong>Function Calling</strong> 來實現的</p>
<table>
<thead>
<tr>
<th>能力</th>
<th>做什麼</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Plan &amp; Todos</strong></td>
<td>拆解大任務，依序執行</td>
</tr>
<tr>
<td><strong>Filesystem &amp; Bash</strong></td>
<td>操作檔案、執行程式（搭配 sandbox）</td>
</tr>
<tr>
<td><strong>Sub-Agent</strong></td>
<td>把耗 token 的任務分給子代理人，隔離 context</td>
</tr>
<tr>
<td><strong>Memory</strong></td>
<td>跨 session 記得使用者與專案的長期資訊</td>
</tr>
<tr>
<td><strong>Skills</strong></td>
<td>按需動態載入的技能 prompt</td>
</tr>
<tr>
<td><strong>更多工具</strong></td>
<td>MCP、Browser、Computer Use</td>
</tr>
</tbody>
</table>
<div class="cite">代表產品: <a href="https://www.claude.com/product/claude-code">Claude Code</a>、<a href="https://github.com/openai/codex">Codex</a>、<a href="https://github.com/google-gemini/gemini-cli">Gemini CLI</a>、LangChain <a href="https://blog.langchain.com/deep-agents/">Deep Agents</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="deep-agent-%E5%85%A7%E5%BB%BA%E8%83%BD%E5%8A%9B-%E2%91%A0-plan--todos">Deep Agent 內建能力 ①: Plan &amp; Todos</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%8E%AF-%E5%AE%83%E8%A7%A3%E6%B1%BA%E4%BB%80%E9%BA%BC%E5%95%8F%E9%A1%8C"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> 它解決什麼問題</h3>
<ul>
<li>只靠 in-context 規劃，思路容易被中間步驟干擾、遺失</li>
<li>改用工具維護外部 todo list，<strong>不會忘記</strong>沒做完的事</li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%A7-%E6%8A%80%E8%A1%93%E4%B8%8A%E6%80%8E%E9%BA%BC%E8%BE%A6%E5%88%B0"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 技術上怎麼辦到</h3>
<p>透過 Function Calling 提供工具:</p>
<ul>
<li><code>TaskCreate</code> 建立任務項目</li>
<li><code>TaskGet</code> 取得任務詳情</li>
<li><code>TaskUpdate</code> 更新任務狀態</li>
<li><code>TaskList</code> 列出所有任務</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="deep-agent-%E5%85%A7%E5%BB%BA%E8%83%BD%E5%8A%9B-%E2%91%A1-filesystem--bash">Deep Agent 內建能力 ②: Filesystem &amp; Bash</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%8E%AF-%E5%AE%83%E8%A7%A3%E6%B1%BA%E4%BB%80%E9%BA%BC%E5%95%8F%E9%A1%8C-1"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> 它解決什麼問題</h3>
<ul>
<li><strong>Filesystem</strong> 讀寫改檔，<strong>Bash</strong> 執行任意 shell 指令</li>
<li>讓 Agent 真的<strong>動手做事</strong>:編譯、跑測試、git、裝套件</li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%A7-%E6%8A%80%E8%A1%93%E4%B8%8A%E6%80%8E%E9%BA%BC%E8%BE%A6%E5%88%B0-1"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 技術上怎麼辦到</h3>
<p>透過 Function Calling 提供工具:</p>
<ul>
<li><code>Read</code>／<code>Edit</code>／<code>Write</code> 讀寫檔案</li>
<li><code>Bash</code> 執行 CLI 指令</li>
<li><code>Glob</code>／<code>Grep</code> 搜尋檔案</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="deep-agent-%E5%85%A7%E5%BB%BA%E8%83%BD%E5%8A%9B-%E2%91%A2-sub-agent">Deep Agent 內建能力 ③: Sub-Agent</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%8E%AF-%E5%AE%83%E8%A7%A3%E6%B1%BA%E4%BB%80%E9%BA%BC%E5%95%8F%E9%A1%8C-2"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> 它解決什麼問題</h3>
<ul>
<li>主 agent 派子代理去研究、查找、驗證</li>
<li>子 agent 是<strong>獨立 context</strong> 跑，只回精簡摘要（<strong>context 隔離</strong>）</li>
<li>可<strong>平行化</strong>:多個子 agent 同時工作</li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%A7-%E6%8A%80%E8%A1%93%E4%B8%8A%E6%80%8E%E9%BA%BC%E8%BE%A6%E5%88%B0-2"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 技術上怎麼辦到</h3>
<p>透過 Function Calling 提供工具:</p>
<ul>
<li>一個叫做 <code>Agent</code> 的工具</li>
<li>工具內就是<strong>呼叫另一個 Agent</strong> 執行，把子 agent 輸出回傳給主 agent</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="deep-agent-%E5%85%A7%E5%BB%BA%E8%83%BD%E5%8A%9B-%E2%91%A3-memory">Deep Agent 內建能力 ④: Memory</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%8E%AF-%E5%AE%83%E8%A7%A3%E6%B1%BA%E4%BB%80%E9%BA%BC%E5%95%8F%E9%A1%8C-3"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> 它解決什麼問題</h3>
<ul>
<li>把<strong>重要資訊存起來</strong>，下次再開 agent，<strong>它還記得</strong></li>
<li>例:Claude Code 的 <code>CLAUDE.md</code>、Codex 的 <code>AGENTS.md</code>、長期 memory 儲存</li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%A7-%E6%8A%80%E8%A1%93%E4%B8%8A%E6%80%8E%E9%BA%BC%E8%BE%A6%E5%88%B0-3"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 技術上怎麼辦到</h3>
<ul>
<li>Agent 一啟動就<strong>預設載入</strong> <code>AGENTS.md</code></li>
<li>使用者可以自己要求<strong>更新</strong> <code>AGENTS.md</code></li>
<li>可自行設計記憶行為:記什麼、存在哪些目錄檔案、什麼時候回憶哪些內容</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="deep-agent-%E5%85%A7%E5%BB%BA%E8%83%BD%E5%8A%9B-%E2%91%A4-skills">Deep Agent 內建能力 ⑤: Skills</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%8E%AF-%E5%AE%83%E8%A7%A3%E6%B1%BA%E4%BB%80%E9%BA%BC%E5%95%8F%E9%A1%8C-4"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> 它解決什麼問題</h3>
<ul>
<li>為特定任務打包的 <strong>prompt ＋工具配置＋程式碼</strong></li>
<li><strong>不全部塞進 context</strong>，用到才載入；寫 markdown 就能新增</li>
<li>例:翻譯 skill、寫部落格 skill、處理 PDF skill</li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%A7-%E6%8A%80%E8%A1%93%E4%B8%8A%E6%80%8E%E9%BA%BC%E8%BE%A6%E5%88%B0-4"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 技術上怎麼辦到</h3>
<ul>
<li>預設 system prompt 只載入 <strong>skills 列表</strong></li>
<li>使用者需要某個 skill 時，Agent 才用讀檔工具<strong>載入完整 skill 內容</strong></li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="deep-agent-%E5%85%A7%E5%BB%BA%E8%83%BD%E5%8A%9B-%E2%91%A5-%E6%9B%B4%E5%A4%9A%E5%B7%A5%E5%85%B7">Deep Agent 內建能力 ⑥: 更多工具</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%8E%AF-%E5%AE%83%E8%A7%A3%E6%B1%BA%E4%BB%80%E9%BA%BC%E5%95%8F%E9%A1%8C-5"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> 它解決什麼問題</h3>
<ul>
<li><strong>MCP</strong>: 接外部 Slack、Gmail、Notion、自建 API…</li>
<li><strong>Browser</strong>: 瀏覽網頁、填表單、點按鈕，能上網做事或用網頁驗證自己的產出</li>
<li><strong>Computer Use</strong>: 直接操作桌面 GUI（看螢幕、移動滑鼠、敲鍵盤）</li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%A7-%E6%8A%80%E8%A1%93%E4%B8%8A%E6%80%8E%E9%BA%BC%E8%BE%A6%E5%88%B0-5"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 技術上怎麼辦到</h3>
<ul>
<li>Browser 與 Computer Use 需要<strong>多模態模型</strong>:讓 AI 看截圖判斷下一步該點哪裡</li>
<li>MCP 標準化工具協議</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E4%BD%86%E6%9C%89%E8%83%BD%E5%8A%9B-%E2%89%A0-%E6%8A%8A%E4%BA%8B%E6%83%85%E5%81%9A%E5%A5%BD">但有能力 ≠ 把事情做好</h2>
<div class="cols gap-sm">
<div class="card green">
<h3 id="%E2%9C%93-%E8%83%BD%E5%8A%9B%E7%B5%A6%E4%BA%86%E4%BD%A0%E8%83%BD%E4%B8%8D%E8%83%BD%E5%81%9A">✓ 能力給了你能不能做</h3>
<p>能讀檔、跑指令、開子代理、記憶、用工具。</p>
</div>
<div class="card" style="background:#fff8c5;">
<h3 id="%E4%BD%86%E6%98%AF%E5%81%9A%E5%BE%97%E5%B0%8D%E4%B8%8D%E5%B0%8D--%E5%81%9A%E5%AE%8C%E4%BA%86%E6%B2%92">? 但是做得對不對 · 做完了沒</h3>
<p>這一步的產出對嗎？整個任務做完了沒？怎麼穩定地做好、做完？</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 2</span></p>
<h1 id="%E4%BB%80%E9%BA%BC%E6%98%AFbrharness-engineering">什麼是<br />Harness Engineering</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%81%9A%E5%AE%8C%E4%BA%86%E8%AA%B0%E8%AA%AA%E4%BA%86%E7%AE%97">「做完了」誰說了算?</h2>
<div class="cols">
<div>
<ul>
<li>Agent 自信地宣稱完成，但東西是壞的</li>
<li>測試沒跑、需求沒做完，它說「已全部完成 <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/>」</li>
<li>你指出問題，它道歉，然後再犯</li>
</ul>
</div>
<div class="card red">
<h3 id="%E9%80%99%E4%B8%8D%E6%98%AF%E5%80%8B%E6%A1%88">這不是個案</h3>
<p>Anthropic 整理長時間執行 agent 的失敗模式，<strong>第一名就是「過早宣告完成」</strong>。</p>
</div>
</div>
<div class="cite">參考:Anthropic <a href="https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents">Effective harnesses for long-running agents</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E4%BB%80%E9%BA%BC%E6%98%AF-harness-%E2%9E%A1%EF%B8%8F-agent--model--harness">什麼是 Harness? <img class="emoji" draggable="false" alt="➡️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/27a1.svg" data-marp-twemoji=""/> Agent = Model + Harness</h2>
<div class="cols">
<div>
<p>這是網路上常見的定義</p>
<p><strong>模型以外的一切</strong>（system prompt、工具、編排、hooks）都算 harness。</p>
</div>
<div class="card red">
<h3 id="%E5%B0%8F%E5%B0%8F%E5%90%90%E6%A7%BD-%F0%9F%A4%B7">小小吐槽 <img class="emoji" draggable="false" alt="🤷" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f937.svg" data-marp-twemoji=""/></h3>
<p>這定義有點偷懶</p>
<blockquote>
<p>就像說「整體 = 核心 + 其他」</p>
</blockquote>
<p>這個其他到底是什麼，我們需要<strong>更可以操作的技術拆解</strong>!</p>
</div>
</div>
<div class="cite">定義出自: <a href="https://www.langchain.com/blog/the-anatomy-of-an-agent-harness">The Anatomy of an Agent Harness</a>（Viv Trivedy）</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E9%A6%96%E5%85%88harness-%E4%B8%8D%E5%8F%AA%E6%98%AF%E6%8A%80%E8%A1%93%E5%8A%9F%E8%83%BD%E5%88%97%E8%A1%A8">首先，harness 不只是技術功能列表</h2>
<div class="cols">
<div class="card red">
<h3 id="%E2%9D%8C-%E4%B8%8D%E6%98%AF%E9%80%99%E5%80%8B"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> 不是這個</h3>
<p>Skills、Sub-Agent、Hooks、Filesystem、worktree</p>
<p>這些都只是<strong>手段</strong>，不是 Harness Engineering 的思維核心。</p>
</div>
<div class="card blue">
<h3 id="%E2%9C%85-%E7%9C%9F%E6%AD%A3%E7%9A%84%E4%B8%BB%E8%BB%B8"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 真正的主軸</h3>
<p>是如何讓 agent 在<strong>執行過程</strong>能被<strong>約束、檢查、動態修正</strong></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%9B%9E%E9%A1%A7-promptcontextharness-%E4%B8%89%E5%B1%A4">回顧 Prompt、Context、Harness 三層</h2>
<p>常被講成一條「演進」之路，但其實技術累加的都會用上，只是各自凸顯一個新的工程焦點:</p>
<table>
<thead>
<tr>
<th></th>
<th>核心問題</th>
<th>技術功能</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Prompt Engineering</strong></td>
<td>怎麼讓模型<strong>這一次</strong>答得更好</td>
<td>system prompt、few-shot、evals</td>
</tr>
<tr>
<td><strong>Context Engineering</strong></td>
<td>在 context window 限制下<strong>選擇</strong>該放的資訊</td>
<td>RAG、memory、compaction、tool offload</td>
</tr>
<tr>
<td><strong>Harness Engineering</strong></td>
<td>怎麼在<strong>執行過程</strong>中約束、檢查、動態修正</td>
<td>skills、filesystem、hooks</td>
</tr>
</tbody>
</table>
<p>並沒有「XXX 已死」這回事，後者是基於前者的發展之上，而非取而代之。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="harness-%E6%A0%B8%E5%BF%83%E7%AD%96%E7%95%A5-%E5%85%88-generate%E5%86%8D-verify">Harness 核心策略: 先 generate，再 verify</h2>
<p>核心策略就是: <strong>驗證 (verification)</strong>，廣義的說就是 <strong>回饋(feedback)</strong></p>
<div class="cols">
<div class="card red">
<h3 id="%E5%B8%B8%E8%A6%8B%E5%A4%B1%E6%95%97">常見失敗</h3>
<p>agent 輸出答案 → agent 覺得「看起來沒問題」→ 就停了。</p>
</div>
<div class="card blue">
<h3 id="%E8%A7%A3%E6%B3%95-generate-%E2%86%92-verify-%E2%86%92-fix">解法: generate → verify → fix</h3>
<p>模型有自我修正的能力，但我們需要讓 Agent 順利觸發進入「輸出 → 回饋驗證 → 修正」這個流程。</p>
</div>
</div>
<div class="small gap-sm">那工程上怎麼確保 verify「真的會發生」？</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%85%A9%E5%80%8B%E8%BB%B8%E6%8A%8A-harness-%E6%8B%86%E8%A7%A3">兩個軸把 harness 拆解</h2>
<p>Thoughtworks 用兩個軸拆解 harness 作法: <strong>方向</strong>×<strong>型態</strong>:</p>
<table>
<thead>
<tr>
<th></th>
<th>運算式 Computational（確定性、程式工具）</th>
<th>推論式 Inferential（LLM 生成）</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>前饋 Feedforward</strong><br />引導器 Guides（行動前引導）</td>
<td>用程式工具產生的 code metadata 與約束：LSP、Codemod／ast-grep、架構規則（ArchUnit 等）</td>
<td><strong>system prompt</strong>、AGENTS.md、Skills、bootstrap instructions、how-to 文件</td>
</tr>
<tr>
<td><strong>回饋 Feedback</strong><br />感測器 Sensors（行動後修正）</td>
<td>測試、linter、type checker、靜態分析（eslint、semgrep）、pre-commit hook</td>
<td><strong>LLM as Judge</strong>、AI code review、Review Skills</td>
</tr>
</tbody>
</table>
<div class="small gap-sm">原文是針對 coding agent 場景，但此框架被我延伸到非 coding agent 上</div>
<div class="cite">參考:Birgitta Böckeler（Thoughtworks）<a href="https://martinfowler.com/articles/harness-engineering.html">Harness engineering for coding agent users</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%A5%BD%E7%9A%84-harness-%E5%81%9A%E5%85%A9%E4%BB%B6%E4%BA%8B">好的 Harness 做兩件事</h2>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%A7%AD-guides-%E5%89%8D%E9%A5%8B"><img class="emoji" draggable="false" alt="🧭" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ed.svg" data-marp-twemoji=""/> Guides 前饋</h3>
<p><strong>提高「一次做對」的機率</strong></p>
<p>文件、skills、範例、架構約束。</p>
<p>軟性引導，做不做最後還是要看 agent</p>
</div>
<div class="card blue">
<h3 id="%F0%9F%93%A1-sensors-%E5%9B%9E%E9%A5%8B"><img class="emoji" draggable="false" alt="📡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4e1.svg" data-marp-twemoji=""/> Sensors 回饋</h3>
<p><strong>輸出之後，感測提供回饋，引導 Agent 自我修正</strong></p>
<p>測試、linter、judge、AI review。</p>
<p>用程式自動觸發，不靠 Agent 自覺。</p>
</div>
</div>
<div class="quote">好的 harness 同時做兩件事: 提高「一次做對」的機率，並在出錯時能自我修正。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%89%8D%E9%A5%8B-guides">前饋 Guides</h2>
<p>你的 system／developer prompt，要把「什麼是好的結果」以及「驗證流程」寫清楚。<br />
例如 AGENTS.md／CLAUDE.md 都會要求 Agent 要去做驗證</p>
<div class="cols">
<div class="card">
<h3 id="claude-code">Claude Code</h3>
<blockquote>
<p>「<strong>非常重要</strong>:完成任務時你<strong>必須</strong>執行 lint 和 typecheck（npm run lint、ruff…），確保程式碼正確。」</p>
</blockquote>
</div>
<div class="card">
<h3 id="codex">Codex</h3>
<blockquote>
<p>「如果 AGENTS.md 裡有可程式化的檢查，你<strong>必須</strong>全部執行並盡力驗證通過。即使只是改文件也一樣。」</p>
</blockquote>
</div>
</div>
<div class="cite">參考:敏捷三叔公 <a href="https://agile3uncles.com/2026/04/15/claude-code-harness-web-to-do-list/">最小可行 harness</a>、<a href="https://blog.aihao.tw/2026/05/03/agents-md-research-and-practices/">AGENTS.md 該寫什麼</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%89%8D%E9%A5%8B%E7%9A%84%E9%99%90%E5%88%B6">前饋的限制</h2>
<p>前饋終究是<strong>軟性、機率性</strong>的引導</p>
<p>你在 AGENTS.md 寫十遍「一定要驗證」，模型還是有可能跳過 <img class="emoji" draggable="false" alt="😢" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f622.svg" data-marp-twemoji=""/></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%9B%9E%E9%A5%8B-sensors-%E6%8A%8A-verify-%E8%AE%8A%E6%88%90%E8%87%AA%E5%8B%95%E5%9F%B7%E8%A1%8C">回饋 Sensors: 把 verify 變成自動執行</h2>
<p>前饋是軟性引導；回饋則用程式<strong>自動執行</strong>，不靠模型自覺</p>
<p>這可以插在 Agent lifecycle 的不同位置，來給 Agent 回饋。</p>
<p>本場將深入講解回饋的四個時機點</p>
<div class="cols gap-sm">
<div class="card">
<p><strong>① 工具執行內</strong>（Part 3）</p>
<p><strong>② request 之間注入</strong>（Part 4）</p>
</div>
<div class="card blue">
<p><strong>③ 單輪結束 · Stop hook</strong>（Part 5）</p>
<p><strong>④ 外層 Loop</strong>（Part 6）</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%95%B6%E7%84%B6%E5%89%8D%E9%A5%8B%E5%92%8C%E5%9B%9E%E9%A5%8B%E7%BC%BA%E4%B8%80%E4%B8%8D%E5%8F%AF">當然，前饋和回饋缺一不可</h2>
<div class="cols">
<div class="card red">
<h3 id="%E8%8B%A5%E5%8F%AA%E6%9C%89%E5%9B%9E%E9%A5%8B%E6%B2%92%E6%9C%89%E5%89%8D%E9%A5%8B">若只有回饋、沒有前饋</h3>
<p>agent 寫 code → 測試失敗 → 改 → 再失敗，跑好幾輪還是超時。</p>
<p>通常不是回饋不夠，是 agent 從頭就不知道「好的執行過程跟結果」該有的樣子。</p>
</div>
<div class="card red">
<h3 id="%E8%8B%A5%E5%8F%AA%E6%9C%89%E5%89%8D%E9%A5%8B%E6%B2%92%E6%9C%89%E5%9B%9E%E9%A5%8B">若只有前饋、沒有回饋</h3>
<p>Agent 可能跳過驗證流程，可能沒有確實做好驗證。不知道做的對不對、不確定做完了沒</p>
</div>
</div>
<div class="quote">
    Agent 需要前饋一開始走對方向，也需要回饋負責把關修正。兩者缺一不可。
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-class="lead" data-theme="default" lang="en-US" class="lead" data-marpit-pagination="27" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="111" data-size="16:9"><div class="big">Harness Engineering:<br />讓 Agent 依目標<strong>持續、正確地動作</strong>的工程。</div>
<p class="gap-sm">本場將重點講「回饋訊號」:要有東西能判斷<strong>做得好不好、做得對不對、做完了沒</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%9B%9E%E9%A5%8B%E7%9A%84%E5%9B%9B%E5%80%8B%E6%99%82%E6%A9%9F%E9%BB%9E">回饋的四個時機點</h2>
<p>把 agent 的迴圈由內而外拆解，回饋有四個時機點:</p>
<table>
<thead>
<tr>
<th>時機</th>
<th>多久觸發一次</th>
<th>成本</th>
<th>修正粒度</th>
<th>對應的 hook</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>① 工具執行內</strong></td>
<td>每次 tool call</td>
<td>毫秒，最便宜</td>
<td>單一動作</td>
<td>Pre／PostToolUse</td>
</tr>
<tr>
<td><strong>② request 之間注入</strong></td>
<td>使用者或程式想注入時</td>
<td>趨近零</td>
<td>當前這一輪的方向</td>
<td>無專屬 hook</td>
</tr>
<tr>
<td><strong>③ 單輪結束</strong></td>
<td>每一輪</td>
<td>秒級</td>
<td>整輪的產出</td>
<td>Stop hook</td>
</tr>
<tr>
<td><strong>④ 外層 Loop</strong></td>
<td>每個 session</td>
<td>分鐘到小時</td>
<td>整個任務</td>
<td>排程／外迴圈</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">

<text x="360" y="221" text-anchor="middle" style="fill:var(--accent);font-size:10.5px">Stop hook 沒過 → 同份 context 再跑一輪</text>
<text x="360" y="254" text-anchor="middle" style="fill:var(--text);font-size:11.5px">一輪 (Turn) = 多次「模型 request → tool calls」反覆，直到模型輸出答案</text>
<path d="M 672 182 L 672 302 Q 672 310 664 310 L 42 310 Q 30 310 30 300 L 30 168 Q 30 158 40 158 L 46 158" style="fill:none;stroke:var(--text-secondary);stroke-width:1.6" marker-end="url(#he2arr)" />
<rect x="150" y="300" width="424" height="20" rx="10" style="fill:var(--bg);stroke:var(--text-secondary);stroke-width:1.3" />
<text x="362" y="314" text-anchor="middle" style="fill:var(--text);font-size:11px;font-weight:600">④ 通過後這個 session 收掉，換上全新 context 再跑一圈</text>
</svg>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 3 · 時機 ①</span></p>
<h1 id="%E5%9C%A8%E5%B7%A5%E5%85%B7%E5%9F%B7%E8%A1%8C%E5%85%A7">在工具執行內</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="tool-call-%E8%A3%A1%E9%9D%A2">Tool Call 裡面</h2>
<p>工具呼叫內，有三個可以設計的地方:</p>
<div class="cols-3">
<div class="card">
<h3 id="%E5%9F%B7%E8%A1%8C%E5%89%8D-%E9%A9%97%E8%AD%89%E8%BC%B8%E5%85%A5">執行前: 驗證輸入</h3>
<p>確定性檢查參數與內容，<br />
擋掉危險或無效的呼叫</p>
</div>
<div class="card">
<h3 id="%E5%9F%B7%E8%A1%8C%E5%BE%8C-%E6%AA%A2%E6%9F%A5%E7%B5%90%E6%9E%9C">執行後: 檢查結果</h3>
<p>對結果做品質檢查，<br />
必要時就地修復或重試</p>
</div>
<div class="card blue">
<h3 id="%E5%B7%A5%E5%85%B7%E5%9B%9E%E5%82%B3%E5%80%BC%E5%A4%BE%E5%B8%B6%E6%8C%87%E5%BC%95">工具回傳值+夾帶指引</h3>
<p>tool response 不只回資料，<strong>還夾帶指示與 metadata</strong>，引導 Agent 的下一步</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-class="lead" data-theme="default" lang="en-US" class="lead" data-marpit-pagination="32" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%B7%A5%E5%85%B7%E8%BC%B8%E5%87%BA%E4%B8%8D%E5%8F%AA%E6%98%AF-function-outputbr%E6%98%AF%E4%BD%A0%E5%AF%AB%E7%B5%A6-agent-%E7%9A%84%E5%9B%9E%E9%A5%8B">工具輸出不只是 function output，<br />是你寫給 Agent 的回饋</h2>
<p>寫程式習慣把回傳值當「資料」: 查到什麼回什麼，出錯就回傳 error code</p>
<div class="big gap-sm">但對 Agent 來說，<strong>tool response 也是一個對話訊息</strong>:<br />你可以在裡面夾帶指示、更多資訊 metadata，<br />甚至告訴 Agent 下一步怎麼做。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%A1%88%E4%BE%8B-text-to-sql-agent">案例: Text-to-SQL Agent</h2>
<div class="cols">
<div class="card">
<h3 id="%E5%A0%B4%E6%99%AF">場景</h3>
<p>使用者用自然語言問財務數據，</p>
<p>Agent 基於 DB schema 產生 SQL</p>
<p>用 <code>execute_sql(sql_query)</code> 工具查詢。</p>
</div>
<div class="card red">
<h3 id="llm-%E7%94%9F%E6%88%90-sql-%E7%9A%84%E9%A2%A8%E9%9A%AA">LLM 生成 SQL 的風險</h3>
<ul>
<li><strong>幻覺</strong>不存在的表格和欄位</li>
<li>生成查詢以外的危險語法</li>
<li>忘記<strong>分頁</strong>，回傳爆量資料</li>
<li>SQL dialect 語法不同</li>
</ul>
</div>
</div>
<div class="small gap-sm">
我們會在 system prompt 插入 table schema 說明有哪些 tables/columns，以及各種 SQL 限制，這是前饋要先寫好。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%9C%A8%E5%B7%A5%E5%85%B7%E5%85%A7-%E6%8A%8A-sql-%E8%A7%A3%E6%9E%90%E6%88%90%E8%AA%9E%E6%B3%95%E6%A8%B9ast%E5%81%9A%E7%A2%BA%E5%AE%9A%E6%80%A7%E7%9A%84%E6%AA%A2%E6%9F%A5%E5%92%8C%E6%94%B9%E5%AF%AB">在工具內: 把 SQL 解析成語法樹(AST)，做確定性的檢查和改寫</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> sqlglot
<span class="hljs-keyword">from</span> sqlglot <span class="hljs-keyword">import</span> exp

tree = sqlglot.parse_one(sql_query, dialect=<span class="hljs-string">&quot;postgres&quot;</span>)

<span class="hljs-comment"># 1. 只允許 SELECT（擋下來）</span>
<span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">isinstance</span>(tree, exp.Select):
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;只允許 SELECT 查詢&quot;</span>

<span class="hljs-comment"># 2. 資料表白名單（擋下來）</span>
<span class="hljs-keyword">for</span> table <span class="hljs-keyword">in</span> tree.find_all(exp.Table):
    <span class="hljs-keyword">if</span> table.name <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> ALLOWED_TABLES:
        <span class="hljs-keyword">return</span> <span class="hljs-string">f&quot;資料表 <span class="hljs-subst">{table.name}</span> 不在允許範圍，可用：<span class="hljs-subst">{ALLOWED_TABLES}</span>&quot;</span>

<span class="hljs-comment"># 3. 沒 LIMIT 就補安全上限（補強）</span>
<span class="hljs-keyword">if</span> tree.args.get(<span class="hljs-string">&quot;limit&quot;</span>) <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:
    tree = tree.limit(<span class="hljs-number">200</span>)

safe_sql = tree.sql(dialect=<span class="hljs-string">&quot;postgres&quot;</span>) <span class="hljs-comment"># 確保輸出 postgres 語法</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%B7%A5%E5%85%B7%E5%9B%9E%E9%A5%8B%E7%9A%84%E8%A8%AD%E8%A8%88">工具回饋的設計</h2>
<p>驗證沒過時，tool response 的品質決定 Agent 自我修正的能力</p>
<div class="cols gap-sm">
<div class="card red">
<h3 id="%E2%9D%8C-%E7%88%9B-error"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> 爛 error</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">ERROR: column &quot;revenue_growth&quot;
does not exist
</code></pre>
<p>Agent 只能瞎猜重試，越改越歪。</p>
</div>
<div class="card green">
<h3 id="%E2%9C%85-%E5%A5%BD-error"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 好 error</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">欄位 revenue_growth 不存在。
financial_metrics table 可用欄位有：
revenue, revenue_yoy, gross_margin…
和 revenue_growth 最相似的欄位有 revenue_yoy, revenue_qoq
</code></pre>
<p>下一步直接被導正。</p>
</div>
</div>
<div class="quote">每個失敗訊息都是引導模型再次做對的<strong>好機會</strong></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E9%80%A3%E6%88%90%E5%8A%9F%E9%83%BD%E5%8F%AF%E4%BB%A5%E5%9B%9E%E5%82%B3%E6%9B%B4%E5%A4%9A%E7%8B%80%E6%85%8B%E8%B3%87%E8%A8%8A">連「成功」都可以回傳更多狀態資訊</h2>
<div class="cols">
<div class="card red">
<h3 id="%E2%9D%8C-%E9%99%BD%E6%98%A5%E7%9A%84%E6%88%90%E5%8A%9F-flag"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> 陽春的成功 flag</h3>
<p><code>{&quot;success&quot;: true}</code> 或 <code>{&quot;count&quot;: 0}</code></p>
<ul>
<li>查詢成功但 0 筆，是真的沒有結果，還是查詢不正確?</li>
<li>是改了幾筆，也看不出來</li>
</ul>
</div>
<div class="card green">
<h3 id="%E2%9C%85-%E5%9B%9E%E5%82%B3%E6%9B%B4%E5%A4%9A%E7%8B%80%E6%85%8B%E8%B3%87%E8%A8%8A"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 回傳更多狀態資訊</h3>
<p>把規模與範圍寫清楚:</p>
<ul>
<li>影響幾筆、動了哪些欄位或區塊</li>
<li>有沒有碰到不該碰的</li>
</ul>
<p>更多資訊，Agent 才有依據判斷「這次結果合不合理」，是否要修正</p>
</div>
</div>
<div class="quote">錯誤要設計，成功也要設計。一個陽春的成功 flag，也可能是「假完成」的訊號</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%B7%A5%E5%85%B7%E5%9B%9E%E5%82%B3%E7%9A%84%E5%BC%95%E5%B0%8E%E8%A8%8A%E6%81%AF">工具回傳的引導訊息</h2>
<p>各種純運算式(Computational)的檢查，回傳的是對應的固定訊息:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">collect_feedback</span>(<span class="hljs-params">output, source</span>):
    <span class="hljs-comment"># 純運算式檢查:規則直接判定,不靠 LLM,沒過就回寫死的固定訊息</span>
    msgs = []
    <span class="hljs-keyword">if</span> count_words(output) &gt; <span class="hljs-number">500</span>:
        msgs.append(<span class="hljs-string">&quot;摘要超過 500 字，請縮短&quot;</span>)
    <span class="hljs-keyword">if</span> missing_required_terms(output):
        msgs.append(<span class="hljs-string">&quot;漏掉必留的專有名詞，請補回&quot;</span>)
    <span class="hljs-keyword">if</span> cosine_similarity(output, source) &lt; <span class="hljs-number">0.8</span>:
        msgs.append(<span class="hljs-string">&quot;與原文語意偏離，請貼近來源重寫&quot;</span>)
    <span class="hljs-keyword">return</span> msgs
</code></pre>
<div class="cols gap-sm">
<div class="card">
<h3 id="%E9%81%8B%E7%AE%97%E5%BC%8F%E6%AA%A2%E6%9F%A5%E5%9B%BA%E5%AE%9A%E8%A8%8A%E6%81%AF">運算式檢查（固定訊息）</h3>
<p>回<strong>事先寫死</strong>的固定字串:又快又穩又可重現。</p>
</div>
<div class="card blue">
<h3 id="%E8%AA%9E%E6%84%8F-judge%E7%95%B6%E5%A0%B4%E7%94%9F%E6%88%90">語意 judge（當場生成）</h3>
<p>若沒辦法用純運算式的檢查，也可用 LLM 當 judge，附上回饋的 <strong>reasoning</strong> 理由。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%A8%AD%E8%A8%88%E5%9B%9E%E5%82%B3%E5%80%BC%E7%9A%84%E5%8F%A6%E4%B8%80%E5%80%8B%E9%87%8D%E9%BB%9E-%E9%9C%80%E8%A6%81%E6%9C%89%E6%84%8F%E8%AD%98%E5%9C%B0%E6%8E%A7%E5%88%B6-context-window">設計回傳值的另一個重點: 需要有意識地控制 context window</h2>
<p>注意控制別塞滿 context。context 過了某個門檻，模型會變笨(context rot)</p>
<p>別忘了 <a href="https://ihower.tw/blog/12817-context-engineering">Context Engineering</a> 的整套策略，各種縮減 context 的技術:</p>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="context-offloading">Context Offloading</h3>
<p><strong>硬性工具輸出上限</strong>、<strong>頭尾保留</strong> (切頭切尾)、<strong>卸載到檔案</strong> (只留預覽 ＋ 路徑，有需要 Agent 再打開看)</p>
</div>
<div class="card">
<h3 id="%E6%AA%A2%E7%B4%A2%E6%8A%80%E8%A1%93">檢索技術</h3>
<p>關鍵字、向量檢索、reranker 等，只挑選相關的 context</p>
</div>
<div class="card">
<h3 id="sub-agent">Sub-Agent</h3>
<p>龐大的中間過程交給 sub-agent 在獨立 context 跑，只回傳結論</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%A1%88%E4%BE%8B-%E7%9F%A5%E8%AD%98%E5%BA%AB-rag-agent">案例: 知識庫 RAG Agent</h2>
<p>知識庫問答 Agent 會配一個 <code>search_knowledge(query)</code> 工具 (關鍵字搜尋＋向量搜尋 等)</p>
<p>工具不只回傳搜尋結果，我們還可以回傳以下資訊，回饋給 Agent 更多資訊:</p>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="1%EF%B8%8F%E2%83%A3-%E6%A8%99%E8%A8%BB%E4%BE%86%E6%BA%90%E8%88%87%E5%88%86%E6%95%B8"><img class="emoji" draggable="false" alt="1️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/31-20e3.svg" data-marp-twemoji=""/> 標註來源與分數</h3>
<p>回傳時標上來源和相關度分數，讓 Agent 有依據判斷哪些該引用、哪些該丟</p>
</div>
<div class="card">
<h3 id="2%EF%B8%8F%E2%83%A3-%E5%90%8C%E6%BA%90%E5%B0%B1-load-%E6%95%B4%E9%A0%81"><img class="emoji" draggable="false" alt="2️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/32-20e3.svg" data-marp-twemoji=""/> 同源就 load 整頁</h3>
<p>好幾個 chunk 都來自同一份文件 → 暗示整份相關。<strong>可以指示 Agent 直接把整頁讀回來</strong>，比散落片段好用</p>
</div>
<div class="card blue">
<h3 id="3%EF%B8%8F%E2%83%A3-%E7%9C%8B%E8%A6%8B-top-k-%E4%BB%A5%E5%A4%96%E7%9A%84%E8%B3%87%E8%A8%8A"><img class="emoji" draggable="false" alt="3️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/33-20e3.svg" data-marp-twemoji=""/> 看見 top-k 以外的資訊</h3>
<p>回傳不只 top-k 搜尋結果，還夾帶整個資料集的統計</p>
</div>
</div>
<div class="cite">參考:Jason Liu <a href="https://jxnl.co/writing/2025/08/27/facets-context-engineering/">Beyond Chunks: Why Context Engineering is the Future of RAG</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%B7%A5%E5%85%B7%E5%9B%9E%E5%82%B3%E9%99%A4%E4%BA%86-top-k%E9%82%84%E5%A4%BE%E5%B8%B6%E7%B5%B1%E8%A8%88%E8%88%87%E6%8C%87%E7%A4%BA">工具回傳除了 top-k，還夾帶統計與指示</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">results</span> <span class="hljs-attr">query</span>=<span class="hljs-string">&quot;API timeout issues&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">ticket</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;LIN-1247&quot;</span> <span class="hljs-attr">status</span>=<span class="hljs-string">&quot;Done&quot;</span>&gt;</span>…<span class="hljs-tag">&lt;/<span class="hljs-name">ticket</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">ticket</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;LIN-1189&quot;</span> <span class="hljs-attr">status</span>=<span class="hljs-string">&quot;Done&quot;</span>&gt;</span>…<span class="hljs-tag">&lt;/<span class="hljs-name">ticket</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">results</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">facets</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">status_facet</span>&gt;</span> <span class="hljs-tag">&lt;<span class="hljs-name">value</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;Done&quot;</span> <span class="hljs-attr">count</span>=<span class="hljs-string">&quot;6&quot;</span>/&gt;</span> <span class="hljs-tag">&lt;<span class="hljs-name">value</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;Open&quot;</span> <span class="hljs-attr">count</span>=<span class="hljs-string">&quot;5&quot;</span>/&gt;</span> <span class="hljs-tag">&lt;/<span class="hljs-name">status_facet</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">facets</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">system-instruction</span>&gt;</span>
  回傳的 2 筆全是 Done。facets 顯示另有 5 筆 Open 沒進 top-k，請改用 search(query, status=&quot;Open&quot;) 追查進行中的問題。
<span class="hljs-tag">&lt;/<span class="hljs-name">system-instruction</span>&gt;</span>
</code></pre>
<div class="cols gap-sm">
<div class="card">
<h3 id="facets-%E6%8F%AD%E9%9C%B2%E9%9A%B1%E8%97%8F%E8%B3%87%E6%96%99"><code>&lt;facets&gt;</code> 揭露隱藏資料</h3>
<p>告訴 Agent:符合的不只你看到這 2 筆，還有 5 筆 Open 沒進 top-k</p>
</div>
<div class="card blue">
<h3 id="system-instruction-%E9%A1%8D%E5%A4%96%E7%9A%84%E6%8C%87%E7%A4%BA"><code>&lt;system-instruction&gt;</code> 額外的指示</h3>
<p>直接在工具輸出裡告訴 Agent 下一步該怎麼搜</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%AA%9E%E6%84%8F-judge-%E6%8A%8A%E5%9B%9E%E9%A5%8B%E4%BA%A4%E7%B5%A6%E5%8F%A6%E4%B8%80%E5%80%8B%E6%A8%A1%E5%9E%8B">語意 judge: 把回饋交給另一個模型</h2>
<p>呼叫另一個模型做 review，把回饋當 tool response 帶回來。從主迴圈看，這仍是一次普通的 tool call。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@function_tool</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">def</span> <span class="hljs-title function_">consult_model</span>(<span class="hljs-params">question, files, model</span>):
    <span class="hljs-string">&quot;&quot;&quot;遇到難題、想確認方向、或要 review 產出時呼叫，
    交給另一個模型給獨立回饋。&quot;&quot;&quot;</span>
    ...
</code></pre>
<p>例如: RAG Agent 生成答案後，用另一個模型檢查有沒有幻覺。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%A1%88%E4%BE%8B-claude-code-%EF%BC%8B-codex-plugin">案例: Claude Code ＋ Codex plugin</h2>
<p>這種做法在 coding agent 上也蠻常見</p>
<div class="card blue">
<p><code>/codex:review</code>: Claude 把本地 git 改動交給 <strong>Codex（GPT）</strong> 做 code review，並說明「只做 review、不准順手改」。一個寫 code、一個分析審查。</p>
</div>
<p>這是人工觸發，也可以寫進前饋規則，說明「在流程中何時、遇到哪類情況就呼叫」</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%B7%A5%E5%85%B7%E5%B1%A4-harness-%E7%9A%84%E8%A8%AD%E8%A8%88%E5%8E%9F%E5%89%87">工具層 Harness 的設計原則</h2>
<div class="cols">
<div class="card">
<h3 id="1%EF%B8%8F%E2%83%A3-%E8%83%BD%E7%A2%BA%E5%AE%9A%E6%80%A7%E6%AA%A2%E6%9F%A5%E6%9C%80%E5%A5%BD"><img class="emoji" draggable="false" alt="1️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/31-20e3.svg" data-marp-twemoji=""/> 能確定性檢查最好</h3>
<p>例如 SQL 語法驗證用 SQLGlot，又快又穩</p>
</div>
<div class="card">
<h3 id="2%EF%B8%8F%E2%83%A3-%E8%AA%9E%E6%84%8F%E5%88%A4%E6%96%B7%E6%89%8D%E7%94%A8-llm-judge"><img class="emoji" draggable="false" alt="2️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/32-20e3.svg" data-marp-twemoji=""/> 語意判斷才用 LLM Judge</h3>
<p>細緻品質好不好沒有確定性 assert 可寫，<br />
使用 LLM judge 補規則型檢查的不足</p>
</div>
</div>
<div class="cols gap-sm">
<div class="card">
<h3 id="3%EF%B8%8F%E2%83%A3-%E5%9B%9E%E9%A5%8B%E6%9C%80%E5%A5%BD%E5%8F%AF%E8%A1%8C%E5%8B%95"><img class="emoji" draggable="false" alt="3️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/33-20e3.svg" data-marp-twemoji=""/> 回饋最好可行動</h3>
<p>錯誤訊息要附「該怎麼辦」，不是只丟一個程式 error code。</p>
</div>
<div class="card">
<h3 id="4%EF%B8%8F%E2%83%A3-%E5%BB%B6%E9%81%B2%E9%A0%90%E7%AE%97%E5%85%A7%E5%AE%8C%E6%88%90"><img class="emoji" draggable="false" alt="4️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/34-20e3.svg" data-marp-twemoji=""/> 延遲預算內完成</h3>
<p>工具層回饋在 tool call 內發生，要注意 latency，別拖慢整個迴圈。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 4 · 時機 ②</span></p>
<h1 id="%E5%85%A9%E6%AC%A1-model-request-%E4%B9%8B%E9%96%93br%E6%8A%8A%E8%A8%8A%E6%81%AF%E6%B3%A8%E5%85%A5%E5%9F%B7%E8%A1%8C%E4%B8%AD%E7%9A%84-agent">兩次 model request 之間，<br />把訊息注入執行中的 agent</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E9%80%99%E5%80%8B%E6%99%82%E6%A9%9F%E5%9C%A8%E5%93%AA%E5%85%A9%E6%AC%A1-model-request-%E4%B9%8B%E9%96%93">這個時機在哪:兩次 model request 之間</h2>
<p>一輪 (Turn) 不是「一問一答」，而是「模型 request → tool calls → 模型 request → …」反覆，直到輸出答案。注入就發生在這個迴圈內部、<strong>還沒輸出答案前</strong>:</p>
<svg viewBox="0 0 720 248" style="width:100%;max-width:1000px;height:auto;display:block;margin:6px auto 0;font-family:-apple-system,'PingFang TC','Noto Sans TC',Helvetica,Arial,sans-serif;" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="s2arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" style="fill:var(--text-secondary)" /></marker>
<marker id="s2arrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" style="fill:var(--accent)" /></marker>
</defs>
<rect x="10" y="56" width="700" height="150" rx="12" style="fill:var(--surface);stroke:var(--accent);stroke-width:1.5" />
<rect x="26" y="44" width="250" height="24" rx="12" style="fill:var(--surface);stroke:var(--accent);stroke-width:1.5" />
<text x="40" y="61" style="fill:var(--accent);font-size:12px;font-weight:700">一輪 Turn (agent 還在進行中)</text>
<rect x="196" y="74" width="328" height="22" rx="11" style="fill:var(--tag-bg);stroke:var(--accent);stroke-width:1.2" />
<text x="360" y="89" text-anchor="middle" style="fill:var(--accent);font-size:10.5px;font-weight:700">↓ 在這裡注入訊息 (人 steer 或程式)</text>
<path d="M 268 96 L 268 116" style="fill:none;stroke:var(--accent);stroke-width:1.2;stroke-dasharray:3 2" marker-end="url(#s2arrA)" />
<path d="M 524 96 L 524 116" style="fill:none;stroke:var(--accent);stroke-width:1.2;stroke-dasharray:3 2" marker-end="url(#s2arrA)" />
<rect x="30" y="120" width="92" height="44" rx="7" style="fill:var(--bg);stroke:var(--border);stroke-width:1.3" />
<text x="76" y="138" text-anchor="middle" style="fill:var(--text);font-size:12px;font-weight:600">模型</text>
<text x="76" y="153" text-anchor="middle" style="fill:var(--text-secondary);font-size:10px">request 1</text>
<line x1="122" y1="142" x2="156" y2="142" style="stroke:var(--text-secondary);stroke-width:1.4" marker-end="url(#s2arr)" />
<rect x="158" y="120" width="92" height="44" rx="7" style="fill:var(--tag-bg);stroke:var(--accent);stroke-width:1.3" />
<text x="204" y="146" text-anchor="middle" style="fill:var(--accent);font-size:12px;font-weight:600">🔧 tool calls</text>
<line x1="250" y1="142" x2="284" y2="142" style="stroke:var(--text-secondary);stroke-width:1.4" marker-end="url(#s2arr)" />
<rect x="286" y="120" width="92" height="44" rx="7" style="fill:var(--bg);stroke:var(--border);stroke-width:1.3" />
<text x="332" y="138" text-anchor="middle" style="fill:var(--text);font-size:12px;font-weight:600">模型</text>
<text x="332" y="153" text-anchor="middle" style="fill:var(--text-secondary);font-size:10px">request 2</text>
<line x1="378" y1="142" x2="412" y2="142" style="stroke:var(--text-secondary);stroke-width:1.4" marker-end="url(#s2arr)" />
<rect x="414" y="120" width="92" height="44" rx="7" style="fill:var(--tag-bg);stroke:var(--accent);stroke-width:1.3" />
<text x="460" y="146" text-anchor="middle" style="fill:var(--accent);font-size:12px;font-weight:600">🔧 tool calls</text>
<line x1="506" y1="142" x2="540" y2="142" style="stroke:var(--text-secondary);stroke-width:1.4;stroke-dasharray:4 3" marker-end="url(#s2arr)" />
<rect x="542" y="120" width="100" height="44" rx="7" style="fill:var(--bg);stroke:var(--border);stroke-width:1.3;stroke-dasharray:4 3" />
<text x="592" y="138" text-anchor="middle" style="fill:var(--text-secondary);font-size:12px;font-weight:600">模型</text>
<text x="592" y="153" text-anchor="middle" style="fill:var(--text-secondary);font-size:10px">輸出答案 (還沒到)</text>
<text x="360" y="186" text-anchor="middle" style="fill:var(--text);font-size:11px">注入發生在每個「tool calls → 下一個 model request」之間 (圖中標記處)</text>
<text x="360" y="200" text-anchor="middle" style="fill:var(--text-secondary);font-size:10.5px">agent 還沒到「輸出答案」這一步，就把新訊息插進這一輪</text>
</svg>
<div class="small gap-sm">不是等 agent 執行完才注入（那是時機③單輪結束），而是在它還在迴圈中間、還沒輸出答案時就插進去。來源可以是人 (steer)，也可以是程式。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%90%8C%E4%B8%80%E5%80%8B%E6%B3%A8%E5%85%A5%E9%BB%9E%E5%85%A9%E7%A8%AE%E7%94%A8%E9%80%94">同一個注入點，兩種用途</h2>
<p>Agent 還在反覆呼叫工具、還沒輸出答案時，就把新訊息插進去，馬上影響它接下來的動作</p>
<div class="cols">
<div class="card blue">
<h3 id="%F0%9F%A7%91-%E7%94%A8%E9%80%94%E4%B8%80-%E4%BA%BA%E4%B8%AD%E9%80%94-steer"><img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9d1.svg" data-marp-twemoji=""/> 用途一: 人中途 steer</h3>
<p>使用者就主動輸入一段話介入，叫做 <strong>steering</strong> 轉向/引導。</p>
<p>在 <strong>Codex、Claude Code</strong> 這類互動式 coding agent 最常見，是內建功能。</p>
</div>
<div class="card">
<h3 id="%E2%9A%99%EF%B8%8F-%E7%94%A8%E9%80%94%E4%BA%8C-%E7%A8%8B%E5%BC%8F%E6%B3%A8%E5%85%A5"><img class="emoji" draggable="false" alt="⚙️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2699.svg" data-marp-twemoji=""/> 用途二: 程式注入</h3>
<p>例如背景工具程式跑完送回結果、外部事件 (webhook、告警) 要讓 agent 知道。</p>
<p>目前<strong>較少框架實作</strong>，少數像 <strong>Pydantic AI</strong> 做成通用機制。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%8F%AA%E8%83%BD%E5%9C%A8-requests-%E4%B9%8B%E9%96%93-%E9%80%99%E6%98%AF-api-%E5%BE%8C%E7%AB%AF%E7%9A%84%E9%99%90%E5%88%B6">只能在 requests 之間: 這是 API 後端的限制</h2>
<p>已經發出 tool calls 但還沒拿到結果，這時若添加 user message 回傳，API 會錯誤</p>
<div class="cols gap-sm">
<div class="card red">
<h3 id="%E2%9D%8C-%E4%B8%8D%E5%90%88%E6%B3%95"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> 不合法</h3>
<p>assistant 發了 tool calls → 還沒等到所有工具結果 → 直接加 user message 回傳。下一個 request 送出就 400。</p>
</div>
<div class="card green">
<h3 id="%E2%9C%85-%E5%90%88%E6%B3%95"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 合法</h3>
<p>assistant 發了 tool calls → <strong>每個 call 的結果都補齊</strong> → 再加 user message → 下一個 request。</p>
</div>
</div>
<div class="small gap-sm">OpenAI、Anthropic 模型發出的<strong>每一個 tool call 都必須先補上對應結果</strong>，中間不能插別的訊息。所以必須等當前 tool 全部執行完、湊成 API 合法狀態，才能在<strong>下一個 model request 之前</strong>注入你的訊息。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="48" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%94%A8%E9%80%94%E4%B8%80-%E4%BA%BA%E4%B8%AD%E9%80%94-steer">用途一: 人中途 steer</h2>
<p>最常見的用途是人主動介入。steering 和 interrupt 都是 <strong>Codex、Claude Code</strong> 的內建功能。這跟 human-in-the-loop 不一樣:</p>
<div class="cols">
<div class="card">
<h3 id="%F0%9F%9B%91-human-in-the-loop"><img class="emoji" draggable="false" alt="🛑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6d1.svg" data-marp-twemoji=""/> Human-in-the-loop</h3>
<p>你<strong>刻意設計一個等待點</strong>，讓 agent 跑到那裡停下來問你 (最典型: 執行某工具前先請使用者確認)。</p>
<p>是 <strong>agent 停下來問你</strong>。</p>
</div>
<div class="card blue">
<h3 id="%F0%9F%A7%AD-steering"><img class="emoji" draggable="false" alt="🧭" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ed.svg" data-marp-twemoji=""/> Steering</h3>
<p>agent <strong>沒有等待點、也不打算停</strong>，是你在它還在執行時主動輸入 (通常因為「需求變了」)。</p>
<p>是<strong>你主動介入</strong>。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%95%B6%E7%94%A8%E6%88%B6%E4%B8%AD%E9%80%94%E8%BC%B8%E5%85%A5%E8%A8%8A%E6%81%AF%E6%99%82%E9%82%84%E5%8F%AF%E4%BB%A5%E7%B4%B0%E5%88%86%E5%85%A9%E7%A8%AE-steering-%E8%88%87-interrupt">當用戶中途輸入訊息時，還可以細分兩種: steering 與 interrupt</h2>
<div class="cols gap-sm">
<div class="card blue">
<h3 id="%F0%9F%A7%AD-%E4%B8%8D%E4%B8%AD%E6%96%B7-steering"><img class="emoji" draggable="false" alt="🧭" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ed.svg" data-marp-twemoji=""/> 不中斷: steering</h3>
<p>訊息先排進佇列，等當前 tool calls 結果到齊、正要發下一個 model request 前才注入。</p>
<p>agent 沒中斷，只是下一步多了你的訊息，<strong>已建立的 context 全部保留</strong>。</p>
</div>
<div class="card red">
<h3 id="%F0%9F%9B%91-%E5%BC%B7%E5%88%B6%E4%B8%AD%E6%96%B7-interrupt"><img class="emoji" draggable="false" alt="🛑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6d1.svg" data-marp-twemoji=""/> 強制中斷: interrupt</h3>
<p>取消正在執行的工具，沒答完的 tool call 硬塞 <code>tool_result</code>，內容是固定字串 <code>aborted</code> ，維持對話 API 合法。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%94%A8%E9%80%94%E4%BA%8C-%E7%A8%8B%E5%BC%8F%E6%B3%A8%E5%85%A5">用途二: 程式注入</h2>
<p>用途常見有:</p>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="%F0%9F%94%A7-%E8%83%8C%E6%99%AF%E5%B7%A5%E5%85%B7%E7%B5%90%E6%9E%9C"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 背景工具結果</h3>
<p>長時間工具在背景跑完，把結果送回 agent。</p>
</div>
<div class="card">
<h3 id="%F0%9F%93%A1-%E5%A4%96%E9%83%A8%E4%BA%8B%E4%BB%B6"><img class="emoji" draggable="false" alt="📡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4e1.svg" data-marp-twemoji=""/> 外部事件</h3>
<p>webhook、錯誤告警、聊天平台訊息主動送進來。</p>
</div>
</div>
<div class="small gap-sm">有提供這個注入點的框架不多: OpenAI Agents SDK、Google ADK 都沒有。少數例外是 Pydantic AI v1.101.0（2026 年 5 月）的 <code>enqueue</code>，兩種模式: <code>asap</code>（盡快插入，就是這篇的時機點）與 <code>when_idle</code>（整輪結束後才插入）。</div>
<div class="cite">參考:<a href="https://pydantic.dev/docs/ai/core-concepts/message-history/#injecting-messages-mid-run">Pydantic AI: Injecting messages mid-run</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%83%8C%E6%99%AF%E5%B7%A5%E5%85%B7%E7%B5%90%E6%9E%9C%E6%80%8E%E9%BA%BC%E9%80%81%E5%9B%9E-agent">背景工具結果怎麼送回 agent</h2>
<p>它分兩步:</p>
<div class="cols gap-sm">
<div class="card blue">
<h3 id="%E7%AC%AC%E4%B8%80%E6%AD%A5-%E7%95%B6%E5%B7%A5%E5%85%B7%E8%A2%AB%E5%91%BC%E5%8F%AB%E6%99%82">第一步: 當工具被呼叫時</h3>
<p>tool call 後不等跑完，馬上回 <code>tool_result</code>，內容是固定的:</p>
<div style="font-family:'SF Mono',Menlo,monospace;font-size:0.6em;background:var(--panel);border-radius:8px;padding:10px 12px;margin-top:8px;color:var(--sub);line-height:1.5;">Tool 'X' is running in background (task N). You will receive the result automatically when it completes.</div>
</div>
<div class="card green">
<h3 id="%E7%AC%AC%E4%BA%8C%E6%AD%A5-%E7%95%B6%E8%83%8C%E6%99%AF%E4%BB%BB%E5%8B%99%E5%AE%8C%E6%88%90%E6%99%82">第二步: 當背景任務完成時</h3>
<p>只能用 user message 插入:</p>
<div style="font-family:'SF Mono',Menlo,monospace;font-size:0.6em;background:var(--panel);border-radius:8px;padding:10px 12px;margin-top:8px;color:var(--sub);line-height:1.5;">Background tool 'X' (task N) completed. Result: …</div>
<p>注意不能用 <code>tool_result</code> 訊息了，因為 API 的 tool call 跟 tool result 是一對一配對的。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 5 · 時機 ③</span></p>
<h1 id="%E5%96%AE%E8%BC%AA%E7%B5%90%E6%9D%9F%E7%9A%84brgoal-%E8%88%87-outcomes">單輪結束的<br />Goal 與 Outcomes</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%A8%AD%E8%A8%88-goal-%E5%8F%AF%E9%A9%97%E8%AD%89%E7%9A%84%E5%81%9C%E6%AD%A2%E6%A2%9D%E4%BB%B6%E5%BC%B7%E8%BF%AB%E6%A8%A1%E5%9E%8B%E8%87%AA%E5%8B%95%E5%86%8D%E4%B8%80%E8%BC%AA">設計 Goal 可驗證的停止條件，強迫模型自動再一輪</h2>
<div class="cols">
<div>
<p>給 Agent 一個目標:</p>
<ul>
<li>希望的<strong>最終狀態</strong>是什麼</li>
<li>用什麼<strong>證據</strong>驗證</li>
<li>有哪些<strong>限制</strong>要遵守</li>
</ul>
<p>讓 Agent 持續修正，直到通過為止。</p>
<p>這是 Codex 和 Claude Code 的內建功能。</p>
</div>
<div class="card blue">
<h3 id="%E6%A0%B8%E5%BF%83%E7%B2%BE%E7%A5%9E">核心精神</h3>
<blockquote>
<p>不能因為「模型<strong>覺得</strong>大概做完了」<br />
就算數。</p>
</blockquote>
<p>完成與否，要對著<strong>停止條件</strong>驗證，<br />
沒過就繼續做。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="55" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="goal-%E5%90%88%E7%B4%84%E6%A8%A1%E6%9D%BF">Goal 合約模板</h2>
<p>好的 Goal 不一定是更長的 prompt，而是一份<strong>精簡的契約</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">/goal &lt;desired end state&gt;                 ← 期望的最終狀態
      verified by &lt;specific evidence&gt;     ← 用什麼證據驗證
      while preserving &lt;constraints&gt;.     ← 同時要保住什麼
Use &lt;allowed inputs, tools, boundaries&gt;.  ← 允許的工具與邊界
Between iterations, &lt;how to choose the next best action&gt;.
If blocked or no valid paths remain,
      &lt;what to report and what would unlock progress&gt;.
</code></pre>
<div class="small gap-sm">範例:「將 p95 latency 降到 120ms 以下，用壓力測試做驗證，並保持測試套件都要通過」</div>
<div class="card blue gap-sm">
<p><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> <strong>讓 AI 幫你寫</strong>:任務夠清楚時，直接 <code>Help me turn this into a strong /goal: &lt;任務描述&gt;</code></p>
</div>
<div class="cite">出處: <a href="https://developers.openai.com/cookbook/examples/codex/using_goals_in_codex">OpenAI Cookbook: Using Goals in Codex</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="56" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E4%B8%8D%E9%81%A9%E5%90%88%E7%94%A8-goal-%E7%9A%84%E6%99%82%E5%80%99">不適合用 Goal 的時候</h2>
<div class="cols">
<div class="card red">
<h3 id="%E2%9D%8C-%E5%AE%8C%E6%88%90%E6%A2%9D%E4%BB%B6%E6%A8%A1%E7%B3%8A"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> 完成條件模糊</h3>
<ul>
<li>「把這個變得<strong>更好</strong>」</li>
<li>「<strong>重構</strong>這段程式碼」</li>
</ul>
<p>沒有可靠的完成條件，</p>
</div>
<div class="card green">
<h3 id="%E2%9C%85-%E5%85%88%E5%AE%9A%E7%BE%A9%E5%86%8D%E9%96%8B%E5%B7%A5"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 先定義，再開工</h3>
<ul>
<li>預期的<strong>最終狀態</strong></li>
<li>驗證用的<strong>測試</strong></li>
<li>要保住的<strong>限制</strong></li>
</ul>
<p>定義不出來？那問題不在工具，<br />
在你還不知道自己要什麼。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E4%BD%BF%E7%94%A8%E8%80%85%E7%9A%84%E8%A7%92%E8%89%B2%E8%BD%89%E8%AE%8A-turn-%E2%86%92-round">使用者的角色轉變: turn → round</h2>
<div class="cols">
<div>
<p>藏在 Goal 背後的，是交付物的轉變:</p>
<ul>
<li>你交付的不再是一句 <strong>prompt</strong>，而是一份「<strong>目標 ＋ 邊界</strong>」的契約</li>
<li>然後讓 Agent 持續去跑: <strong>prompt → 判斷完成沒 → 再 prompt</strong> 讓 agent 繼續做</li>
<li>思考單位，從「一次對話 <strong>turn</strong>」換成「一輪工作 <strong>round/loop</strong>」</li>
</ul>
</div>
<div class="card blue">
<h3 id="%E9%82%A3%E9%80%99%E8%BF%B4%E5%9C%88%E6%80%8E%E9%BA%BC%E5%88%A4%E6%96%B7%E5%81%9A%E5%AE%8C%E4%BA%86%E6%B2%92">那這迴圈怎麼判斷「做完了沒」？</h3>
<p>有各種不同實作，讓我幫你分析。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%B7%B1%E5%85%A5%E7%A0%94%E7%A9%B6%E4%B8%89%E7%A8%AE%E7%94%A2%E5%93%81%E5%AF%A6%E4%BD%9C%E6%B2%BF%E8%91%97%E9%A9%97%E8%AD%89%E7%9A%84-judge-%E6%9C%89%E5%A4%9A%E7%8D%A8%E7%AB%8B%E4%BE%86%E7%9C%8B">深入研究三種產品實作，沿著「驗證的 Judge 有多獨立」來看</h2>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="codex-%E7%9A%84-goal">Codex 的 Goal</h3>
<p>由<strong>主模型自我審計</strong>，自己呼叫 <code>update_goal</code> 宣告</p>
</div>
<div class="card">
<h3 id="claude-code-%E7%9A%84-gooal">Claude Code 的 Gooal</h3>
<p>每輪結束，交給獨立的 <strong>Haiku</strong> 小模型裁決</p>
</div>
<div class="card blue">
<h3 id="claude-managed-agents-%E7%9A%84-outcome">Claude Managed Agents 的 Outcome</h3>
<p>由獨立的 grader agent 拿 rubric 評分標準，去檢查產出物做驗收</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="59" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%AF%A6%E4%BD%9C%E4%B8%80-codex-goal%E6%B2%92%E6%9C%89%E8%A3%81%E5%88%A4%E7%9A%84%E8%87%AA%E6%88%91%E5%AF%A9%E8%A8%88">實作一: Codex /goal，沒有裁判的自我審計</h2>
<p>Codex 沒有第二個模型在做判定，是自我審計</p>
<div class="cols gap-sm">
<div class="card">
<h3 id="agent-loop-%E5%83%8F%E6%98%AF%E7%A2%BA%E5%AE%9A%E6%80%A7%E7%8B%80%E6%85%8B%E6%A9%9F">Agent loop 像是確定性狀態機</h3>
<ul>
<li>當判斷完成時，主模型呼叫 <code>update_goal(complete)</code>更新狀態</li>
<li>如果狀態還是 Active，就重新注入同一份 <a href="https://github.com/openai/codex/blob/main/codex-rs/prompts/templates/goals/continuation.md">continuation.md</a> prompt 強迫 Agent 繼續跑下一輪</li>
</ul>
</div>
<div class="card blue">
<h3 id="%E5%88%A4%E5%AE%9A%E8%80%85%E5%B0%B1%E6%98%AF%E4%B8%BB%E6%A8%A1%E5%9E%8B%E8%87%AA%E5%B7%B1">判定者就是主模型自己</h3>
<ul>
<li>完成 = 模型呼叫 <code>update_goal(complete)</code></li>
<li>Agent 帶著完整的對話紀錄和推理脈絡繼續下一輪</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="60" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="codex-goal%E8%87%AA%E6%88%91%E5%AF%A9%E8%A8%88%E8%BF%B4%E5%9C%88">Codex /goal:自我審計迴圈</h2>
<svg viewBox="0 0 700 268" style="width:100%;max-width:1060px;max-height:470px;height:auto;display:block;margin:14px auto" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codex /goal 自我審計迴圈示意圖">
<defs>
<marker id="cdxB" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:var(--accent)" /></marker>
<marker id="cdxG" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:#1a7f37" /></marker>
</defs>
<rect x="462" y="8" width="160" height="34" rx="8" style="fill:#dafbe1;stroke:#1a7f37;stroke-width:1.5" />
<text x="542" y="30" text-anchor="middle" style="fill:#1a7f37;font-size:11.5px;font-weight:700">update_goal(complete) ✅</text>
<rect x="18" y="62" width="168" height="60" rx="8" style="fill:var(--surface);stroke:var(--border);stroke-width:1.5" />
<text x="102" y="88" text-anchor="middle" style="fill:var(--text);font-size:12.5px;font-weight:700">注入 continuation.md</text>
<text x="102" y="107" text-anchor="middle" style="fill:var(--text-secondary);font-size:11px">每輪同一份合約 prompt</text>
<rect x="236" y="62" width="176" height="60" rx="8" style="fill:var(--tag-bg);stroke:var(--accent);stroke-width:1.5" />
<text x="324" y="88" text-anchor="middle" style="fill:var(--text);font-size:12.5px;font-weight:700">主 agent 跑一輪</text>
<text x="324" y="107" text-anchor="middle" style="fill:var(--text-secondary);font-size:11px">推理 + 工具呼叫</text>
<rect x="462" y="56" width="160" height="72" rx="8" style="fill:var(--surface);stroke:var(--border);stroke-width:1.5" />
<text x="542" y="86" text-anchor="middle" style="fill:var(--text);font-size:12.5px;font-weight:700">自我審計</text>
<text x="542" y="105" text-anchor="middle" style="fill:var(--text-secondary);font-size:11px">達成目標?</text>
<line x1="186" y1="92" x2="232" y2="92" style="stroke:var(--accent);stroke-width:1.5" marker-end="url(#cdxB)" />
<line x1="412" y1="92" x2="458" y2="92" style="stroke:var(--accent);stroke-width:1.5" marker-end="url(#cdxB)" />
<line x1="542" y1="56" x2="542" y2="46" style="stroke:#1a7f37;stroke-width:1.5" marker-end="url(#cdxG)" />
<text x="552" y="54" style="fill:#1a7f37;font-size:10.5px">是</text>
<path d="M542,128 V196 H102 V126" style="fill:none;stroke:var(--accent);stroke-width:1.5" marker-end="url(#cdxB)" />
<text x="324" y="189" text-anchor="middle" style="fill:var(--text-secondary);font-size:10.5px">否: 沒呼叫 update_goal → thread idle 且 goal.status = Active → 再注入</text>
<text x="350" y="230" text-anchor="middle" style="fill:var(--text);font-size:11.5px;font-weight:600">判定者就是主 agent 自己, 全程沒有第二個模型</text>
</svg>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="61" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="codex-%E6%80%8E%E9%BA%BC%E9%98%B2%E9%81%8E%E6%97%A9%E5%AE%A3%E5%91%8A%E5%AE%8C%E6%88%90">Codex 怎麼防「過早宣告完成」</h2>
<p>判定權在主模型手上，Codex 用 prompt 要求以「當前 worktree 與外部狀態」去自查</p>
<div class="cols gap-sm">
<div class="card">
<h3 id="tool-description">Tool description</h3>
<p><a href="https://github.com/openai/codex/blob/main/codex-rs/ext/goal/src/spec.rs">update_goal 的 description</a> 寫好寫滿:</p>
<blockquote>
<p>Set status to <code>complete</code> <strong>only when the objective has actually been achieved</strong> and no required work remains.</p>
</blockquote>
</div>
<div class="card blue">
<h3 id="%E6%AF%8F%E8%BC%AA%E6%B3%A8%E5%85%A5%E7%9A%84-continuation-prompt">每輪注入的 Continuation prompt</h3>
<p>要求模型逐項找證據:</p>
<blockquote>
<p>&quot;treat completion as <strong>unproven</strong> and verify it against the actual current state&quot;<br />
&quot;The audit must <strong>prove</strong> completion, not merely fail to find obvious remaining work&quot;</p>
</blockquote>
<p>每輪注入的 prompt 都一樣 (只有 Budget 數字不同)</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="62" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%88%A5%E5%8F%AA%E7%9C%8B%E5%90%8D%E5%AD%97%E8%A6%81%E7%9C%8B%E5%AF%A6%E4%BD%9C">別只看名字，要看實作</h2>
<div class="cols">
<div class="card red">
<h3 id="%E6%B5%81%E5%82%B3%E7%9A%84%E8%AA%A4%E8%A7%A3">流傳的誤解</h3>
<p>有些技術文章寫: Codex 的 Goal「用一個獨立小模型每回合評分」</p>
</div>
<div class="card green">
<h3 id="%E7%BF%BB%E5%8E%9F%E5%A7%8B%E7%A2%BC%E8%B7%9F%E6%96%87%E4%BB%B6%E6%89%8D%E7%9F%A5%E9%81%93">翻原始碼跟文件才知道</h3>
<p>沒有第二個 model、沒有額外的 grader</p>
</div>
</div>
<div class="quote">harness 的實作細節，不能靠幻覺想像那是怎麼做的</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="63" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%AF%A6%E4%BD%9C%E4%BA%8C-claude-code-%E7%9A%84-goal%E7%8D%A8%E7%AB%8B-haiku-%E8%AE%80%E5%88%AA%E6%B8%9B-transcript">實作二: Claude Code 的 Goal，獨立 Haiku 讀刪減 transcript</h2>
<p>Claude Code 把判定交給<strong>另一個模型</strong>。當主迴圈（Opus）輸出答案時，harness 不交還控制權，而是發一個 request 把整段對話交給一個獨立小模型來審計 (類似 fork):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Based on the conversation transcript above,
has the following stopping condition been satisfied?

&lt;stopping condition&gt;

Answer based on transcript evidence only.
</code></pre>
<div class="card red gap-sm">
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> 注意: 這只會看對話紀錄，審計是不會呼叫工具打開檔案、實際檢查 artifact 產出物</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="64" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="claude-code-goal-%E7%9A%84%E4%B8%89%E5%80%8B%E7%B4%B0%E7%AF%80">Claude Code /goal 的三個細節</h2>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="%E7%8D%A8%E7%AB%8B%E7%9A%84%E5%B0%8F%E6%A8%A1%E5%9E%8B">獨立的小模型</h3>
<p>預設 <strong>Haiku</strong>，用另一份 system prompt</p>
</div>
<div class="card">
<h3 id="transcript-%E6%98%AF%E9%87%8D%E7%B5%84%E5%89%AF%E6%9C%AC">transcript 是重組副本</h3>
<p>保留對話紀錄、工具呼叫紀錄，<strong>移除</strong> thinking、移除整包 claudeMd 環境、tool metadata 等</p>
</div>
<div class="card">
<h3 id="structured-output">structured output</h3>
<p>回覆 <code>{ok, reason, impossible}</code>，包括回饋理由，以及是否不可能辦到(此時應該放行，避免無窮迴圈卡死)。</p>
</div>
</div>
<div class="cols gap-sm">
<div class="card green">
<h3 id="%E5%88%A4%E6%98%AF">判「是」</h3>
<p>目標完成，把最後答案輸出給你</p>
</div>
<div class="card blue">
<h3 id="%E5%88%A4%E5%90%A6">判「否」</h3>
<p>擋下，把 Haiku 寫的 <code>reason</code> 注入主 agent，強迫跑下一輪</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="65" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="claude-code-goalhaiku-%E8%A3%81%E5%88%A4%E6%B5%81%E7%A8%8B">Claude Code /goal:Haiku 裁判流程</h2>
<svg viewBox="0 0 700 324" style="width:100%;max-width:1060px;max-height:470px;height:auto;display:block;margin:14px auto" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Code /goal fork 判定示意圖">
<defs>
<marker id="ccB" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:var(--accent)" /></marker>
<marker id="ccG" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:#1a7f37" /></marker>
<marker id="ccR" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:#cf222e" /></marker>
</defs>
<rect x="24" y="20" width="194" height="56" rx="8" style="fill:var(--tag-bg);stroke:var(--accent);stroke-width:1.5" />
<text x="121" y="44" text-anchor="middle" style="fill:var(--text);font-size:12.5px;font-weight:700">主 agent 跑一輪 (Opus)</text>
<text x="121" y="62" text-anchor="middle" style="fill:var(--text-secondary);font-size:11px">自認達成, 要結束</text>
<rect x="262" y="20" width="120" height="56" rx="8" style="fill:var(--surface);stroke:var(--border);stroke-width:1.5" />
<text x="322" y="44" text-anchor="middle" style="fill:var(--text);font-size:12.5px;font-weight:700">Stop hook</text>
<text x="322" y="62" text-anchor="middle" style="fill:var(--text-secondary);font-size:11px">攔下結束</text>
<line x1="218" y1="48" x2="258" y2="48" style="stroke:var(--accent);stroke-width:1.5" marker-end="url(#ccB)" />
<line x1="322" y1="76" x2="322" y2="112" style="stroke:var(--accent);stroke-width:1.5" marker-end="url(#ccB)" />
<text x="338" y="94" style="fill:var(--text-secondary);font-size:10.5px">複製刪減版 transcript</text>
<text x="338" y="108" style="fill:var(--text-secondary);font-size:10.5px">(剝除 thinking)</text>
<rect x="232" y="116" width="180" height="64" rx="8" style="fill:#fff8c5;stroke:#9a6700;stroke-width:1.5" />
<text x="322" y="142" text-anchor="middle" style="fill:#9a6700;font-size:12.5px;font-weight:700">獨立 Haiku 裁判</text>
<text x="322" y="161" text-anchor="middle" style="fill:var(--text-secondary);font-size:10.5px">另一個模型, 只讀 transcript</text>
<path d="M412,148 H575 V244" style="fill:none;stroke:#1a7f37;stroke-width:1.5" marker-end="url(#ccG)" />
<text x="486" y="140" text-anchor="middle" style="fill:#1a7f37;font-size:10.5px">ok: true</text>
<path d="M232,148 H170 V244" style="fill:none;stroke:#cf222e;stroke-width:1.5" marker-end="url(#ccR)" />
<text x="198" y="140" text-anchor="middle" style="fill:#cf222e;font-size:10.5px">ok: false</text>
<rect x="470" y="246" width="210" height="54" rx="8" style="fill:#dafbe1;stroke:#1a7f37;stroke-width:1.5" />
<text x="575" y="270" text-anchor="middle" style="fill:var(--text);font-size:12px;font-weight:700">目標完成, 交還控制 ✅</text>
<text x="575" y="288" text-anchor="middle" style="fill:var(--text-secondary);font-size:10.5px">goal 達成</text>
<rect x="20" y="246" width="300" height="54" rx="8" style="fill:#ffebe9;stroke:#cf222e;stroke-width:1.5" />
<text x="170" y="270" text-anchor="middle" style="fill:var(--text);font-size:12px;font-weight:700">reason 注入回主 thread</text>
<text x="170" y="288" text-anchor="middle" style="fill:var(--text-secondary);font-size:10.5px">針對性診斷 → 主 agent 繼續下一輪</text>
<path d="M20,273 H10 V48 H24" style="fill:none;stroke:var(--accent);stroke-width:1.5" marker-end="url(#ccB)" />
</svg>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="66" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%88%A4%E6%B2%92%E5%AE%8C%E6%88%90%E4%B9%8B%E5%BE%8C%E5%85%A9%E5%AE%B6%E5%B7%AE%E5%9C%A8%E5%93%AA">判「沒完成」之後，兩家差在哪</h2>
<table>
<thead>
<tr>
<th></th>
<th>Codex /goal</th>
<th>Claude Code /goal</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>回饋形式</strong></td>
<td>重播同一份 continuation.md，只有 budget 數字在動</td>
<td>Haiku 寫的針對性診斷，指出 transcript 缺了什麼</td>
</tr>
<tr>
<td><strong>下一步依據</strong></td>
<td>環境證據(測試失敗、compile error等)＋自己保留的 reasoning</td>
<td>外部裁判指出缺口</td>
</tr>
<tr>
<td><strong>成本代價</strong></td>
<td>每輪多累積一份 prompt，但會有 prompt cache</td>
<td>每輪多一次 Haiku call，主 thread 只增加一小段 reason</td>
</tr>
<tr>
<td><strong>失效模式</strong></td>
<td>模型有盲點時無外部視角打破，可能連錯好幾輪</td>
<td>Haiku 誤判:會被自信的收尾語言騙過</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="67" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%AF%A6%E4%BD%9C%E4%B8%89-claude-managed-agents-%E7%9A%84-outcome">實作三: Claude Managed Agents 的 Outcome</h2>
<div class="cols">
<div>
<p>第三種最為獨立，獨立 Agent 拿著 rubric 操作 artifact 做檢查:</p>
<ul>
<li>Grader 在<strong>全新 context window</strong>:只拿 rubric 與產出物，<strong>看不到主 agent 的推理與敘事</strong></li>
<li>不只「看」:而是有工具操作，可以像真實使用者<strong>實際操作</strong> artifact 產出物，開檔、點 UI、打 API、查 DB 等</li>
<li>Rubric <strong>逐條可評分</strong>;沒過就帶著<strong>逐條缺失</strong>進下一輪</li>
<li><code>max_iterations</code> 預設 3、最多 20</li>
</ul>
</div>
<div class="card">
<h3 id="rubric-%E8%A9%95%E5%88%86%E6%A2%9D%E4%BB%B6-%E7%AF%84%E4%BE%8B">Rubric 評分條件 範例</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># Outcome: 研究報告完成</span>
<span class="hljs-bullet">-</span> [ ] 涵蓋 7 項必查數據，各附來源
<span class="hljs-bullet">-</span> [ ] 每個引用 [n] 連到有效 URL，
<span class="hljs-code">      且原文逐字支持該主張
- [ ] 財務數字出自 10-K / 10-Q 正式文件
</span></code></pre>
</div>
</div>
<div class="cite">參考:<a href="https://platform.claude.com/docs/en/managed-agents/define-outcomes">Claude: Define outcomes</a>、Anthropic <a href="https://www.anthropic.com/engineering/harness-design-long-running-apps">Harness design for long-running apps</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="68" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="outcome%E7%8D%A8%E7%AB%8B-grader-%E6%93%8D%E4%BD%9C-artifact">Outcome:獨立 grader 操作 artifact</h2>
<svg viewBox="0 0 700 282" style="width:100%;max-width:1060px;max-height:470px;height:auto;display:block;margin:14px auto" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Managed Agents Outcome 獨立 grader 示意圖">
<defs>
<marker id="ocB" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:var(--accent)" /></marker>
<marker id="ocG" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:#1a7f37" /></marker>
<marker id="ocR" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" style="fill:#cf222e" /></marker>
</defs>
