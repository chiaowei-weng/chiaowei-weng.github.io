</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="69" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%9B%B8%E6%AF%94%E8%87%AA%E8%A9%95%E7%8D%A8%E7%AB%8B%E9%A9%97%E6%94%B6%E6%98%AF%E6%9C%80%E6%BA%96%E7%A2%BA%E7%9A%84">相比自評，獨立驗收是最準確的</h2>
<div class="cols">
<div class="card red">
<h3 id="agent-%E6%9C%83%E8%87%AA%E6%88%91%E5%90%B9%E6%8D%A7">Agent 會自我吹捧</h3>
<p>要 agent 評自己做的東西，它傾向<strong>自信地稱讚</strong>，哪怕在人眼中品質明顯普通。</p>
<p>而且 context 裡的錯誤推理會<strong>不斷累積</strong>，前面說服了自己「方向對」，後面就一路錯下去。</p>
</div>
<div class="card blue">
<h3 id="%E5%95%8F%E9%A1%8C%E5%9C%A8%E6%96%BC%E8%AA%B0%E4%BE%86%E6%89%B9%E5%88%A4">問題在於「誰來批判」</h3>
<p>同一個 agent 較難對自己的產出下得了手，換一個全新 context 獨立評審，比較容易做出準確的 Judge。</p>
</div>
</div>
<div class="quote">「調出一個挑剔的獨立 evaluator，比教會 agent 自我批判容易得多。」</div>
<div class="cite">出處: Anthropic <a href="https://www.anthropic.com/engineering/harness-design-long-running-apps">Harness design for long-running apps</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="70" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%AD%B8%E7%95%8C%E7%A0%94%E7%A9%B6%E8%A1%A8%E7%A4%BA-%E8%B6%8A%E7%8D%A8%E7%AB%8B%E8%B6%8A%E6%9C%83%E5%8B%95%E6%89%8B%E5%88%A4%E5%AE%9A%E8%B6%8A%E5%8F%AF%E4%BF%A1">學界研究表示: 越獨立、越會動手，判定越可信</h2>
<div class="cols gap-sm">
<div class="card red">
<h3 id="%E8%87%AA%E6%88%91%E8%A9%95%E5%AF%A9">自我評審</h3>
<ul>
<li><strong>純自我修正</strong>: 缺乏外部回饋時容易失敗</li>
<li><strong>只讀文字的 judge</strong>: 偵測假性完成(false success)能力有限，容易被「自信的收尾語言」帶著走</li>
</ul>
</div>
<div class="card green">
<h3 id="%E7%8D%A8%E7%AB%8B%E8%A9%95%E5%AF%A9">獨立評審</h3>
<ul>
<li><strong>環境／執行回饋</strong>: 看測試與執行結果，不看語言宣稱</li>
<li><strong>rubric 分解</strong>: 把驗收拆成逐條標準</li>
<li><strong>Agent-as-a-Judge</strong>: 能讀檔、跑指令的裁判，可靠度接近人類</li>
</ul>
</div>
</div>
<div class="small gap-sm">越往獨立、越會實際操作的那端，判定越可信。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="71" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E4%B8%89%E7%A8%AE%E5%AF%A6%E4%BD%9C%E7%9A%84%E7%B8%BD%E6%AF%94%E8%BC%83">三種實作的總比較</h2>
<table>
<thead>
<tr>
<th></th>
<th>Codex 的 Goal</th>
<th>Claude Code 的 Goal</th>
<th>Claude Managed Agents Outcomes</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>誰來判定</strong></td>
<td><strong>主模型自我審計</strong></td>
<td>獨立的 Haiku</td>
<td>全新 context 的 grader agent</td>
</tr>
<tr>
<td><strong>harness 角色</strong></td>
<td>不判斷，閒置時重播合約 prompt</td>
<td>每輪結束送 transcript 裁決</td>
<td>自動配置 grader 評估迴圈</td>
</tr>
<tr>
<td><strong>看什麼證據</strong></td>
<td>自己 context 裡的一切(含 reasoning)</td>
<td><strong>刪減版 transcript</strong></td>
<td><strong>只看 artifact，實際操作驗收</strong></td>
</tr>
<tr>
<td><strong>怎麼宣告完成</strong></td>
<td>主模型呼叫 <code>update_goal</code></td>
<td>yes／no ＋診斷 reason</td>
<td>rubric 逐條 pass／fail</td>
</tr>
<tr>
<td><strong>沒完成時的回饋</strong></td>
<td>沒有診斷，只重播同一份模板</td>
<td>一段針對性診斷，指出缺什麼</td>
<td>逐條列出缺失，最具體</td>
</tr>
</tbody>
</table>
<div class="quote">獨立性:  Codex Goal &lt; Claude Code goal &lt; Managed Agents Outcomes</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="72" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E4%BD%86%E6%98%AF%E5%B0%8D%E5%B7%A5%E7%A8%8B%E5%B8%AB%E4%BE%86%E8%AA%AA%E4%B8%80%E5%88%87%E9%83%BD%E6%9C%89-tradeoff-%E6%88%90%E6%9C%AC%E5%92%8C%E7%8D%A8%E7%AB%8B%E6%80%A7%E7%9A%84%E4%BB%A3%E5%83%B9">但是對工程師來說，一切都有 tradeoff: 成本和獨立性的代價</h2>
<p>獨立性換來可靠度，但要付出代價。差別不只是「單次評估多少錢」，也要看「錯誤多久才被發現」</p>
<table>
<thead>
<tr>
<th></th>
<th>獨立性／可靠度</th>
<th>單次評估成本</th>
<th>錯誤多久被發現</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Codex 自我審計</strong></td>
<td>低:主模型自評</td>
<td>趨近零:只查狀態</td>
<td>靠模型自己就先發現</td>
</tr>
<tr>
<td><strong>Claude Code Haiku</strong></td>
<td>中:獨立小模型讀 transcript</td>
<td>小:約 1-2 秒</td>
<td>每 turn 一次</td>
</tr>
<tr>
<td><strong>Outcome grader</strong></td>
<td>高:獨立 agent 操作 artifact</td>
<td>高:數十倍、約 8 分鐘</td>
<td>整個 iteration 做完才抓到</td>
</tr>
</tbody>
</table>
<div class="quote">越獨立越可靠，但需要用到更多 tokens 來分析，錯誤也是在整個流程中越晚被發現，導致總成本較貴也較慢</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="73" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="openai-codex-goal-%E7%82%BA%E4%BB%80%E9%BA%BC%E4%B8%8D%E7%94%A8%E7%8D%A8%E7%AB%8B%E8%A3%81%E5%88%A4">OpenAI Codex goal 為什麼不用獨立裁判?</h2>
<div class="cols gap-sm">
<div class="card">
<h3 id="%E6%9C%89%E5%85%A9%E5%B1%A4%E5%8F%AF%E4%BB%A5%E8%A3%81%E5%88%A4">有兩層可以裁判:</h3>
<ul>
<li><strong>harness 層</strong>: 用獨立裁判，就像 Claude 作法</li>
<li><strong>模型層</strong>: 要靠模型本身的驗證、自我審計能力行不行</li>
</ul>
</div>
<div class="card blue">
<h3 id="%E6%88%91%E5%80%8B%E4%BA%BA%E6%8E%A8%E6%B8%AC">我個人推測</h3>
<ul>
<li>我推測 OpenAI 有特別加強 update_goal 的 post-training 模型訓練，強化模型自我審計的能力</li>
<li><strong>比較節省執行 tokens 的總成本</strong></li>
</ul>
</div>
</div>
<div class="small gap-sm">兩家方向不同: OpenAI 偏向加強模型訓練 goal、把自評 prompt 寫好。Claude 則用 harness 層的獨立裁判來做。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="74" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%A6%82%E6%9E%9C%E6%98%AF%E8%87%AA%E8%A1%8C%E9%96%8B%E7%99%BC-agent%E8%A9%B2%E6%80%8E%E9%BA%BC%E9%81%B8">如果是自行開發 agent，該怎麼選</h2>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="%E8%87%AA%E6%88%91%E5%AF%A9%E8%A8%88codex-%E5%BC%8F">自我審計(Codex 式)</h3>
<p><strong>調教難度較高。</strong>高度依賴模型的自律，一般模型容易過早宣告完成。</p>
<p>適合: 重視 Latency 和成本的中短任務。</p>
</div>
<div class="card">
<h3 id="transcript-%E8%A3%81%E5%88%A4claude-code-%E5%BC%8F">Transcript 裁判(Claude Code 式)</h3>
<p><strong>折衷做法。</strong>小模型判 transcript，好實作、好評估(輸入輸出都是文字)。</p>
<p>適合:中程任務，在 transcript 中就能看到可信的證明。</p>
</div>
<div class="card blue">
<h3 id="%E7%8D%A8%E7%AB%8B-verifyoutcome-%E5%BC%8F">獨立 verify(Outcome 式)</h3>
<p><strong>效果最好，但成本最高、latency 是最大弱點。</strong>每次驗收要把 artifact 跑起來操作。</p>
<p>適合:長時間、以交付物為終點，價值高到值得花評估開銷。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="75" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%B6%9C%E5%90%88%E6%A1%88%E4%BE%8B-%E4%BD%BF%E7%94%A8%E8%80%85%E8%A8%AA%E8%AB%87-agent%E7%B5%90%E5%90%88%E5%85%A9%E5%AE%B6%E7%9A%84%E5%81%9A%E6%B3%95">綜合案例: 使用者訪談 Agent，結合兩家的做法</h2>
<div class="cols">
<div>
<p>需求: 按訪綱逐題訪問用戶</p>
<p>挑戰: 但什麼時候該換下一題？這題問夠了沒？</p>
<p>模型會偏向「覺得差不多了就想往下走」，跟第二篇的<strong>過早宣告完成</strong>是同一個問題，只是這裏是「這<strong>一題</strong>問完了沒」。</p>
</div>
<div class="card red">
<h3 id="%E6%88%91%E7%9A%84%E5%81%9A%E6%B3%95">我的做法</h3>
<ul>
<li>借 <strong>Claude Code</strong> 的 transcript judge 把關「這題問夠了沒」</li>
<li>借 <strong>Codex</strong> 每輪重新注入 prompt 的做法，讓訪談持續往前</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="76" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%80%9F-claude-code-%E7%9A%84%E5%81%9A%E6%B3%95-%E6%8F%90%E4%BE%9B%E6%8F%9B%E9%A1%8C%E5%B7%A5%E5%85%B7%E8%A3%A1%E9%9D%A2%E5%81%9A-transcript-judge">借 Claude Code 的做法: 提供換題工具，裡面做 transcript judge</h2>
<p>agent 想跳下一題時，呼叫 <code>switch_next_question_workflow</code> 工具，裡面是一個獨立 Judge 審核:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@function_tool</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">def</span> <span class="hljs-title function_">switch_next_question_workflow</span>(<span class="hljs-params">reason: <span class="hljs-built_in">str</span>, user_requested_next: <span class="hljs-built_in">bool</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;當你判斷目前這題已取得足夠答案、或使用者要求跳題時呼叫。&quot;&quot;&quot;</span>
    <span class="hljs-comment"># 真正的判定在 server 端，工具只是把請求轉過去</span>
    ...
</code></pre>
<div class="small gap-sm">prompt 寫說:「回傳 Y／已切換才代表進到下一題」、「回傳 N 你 <strong>MUST</strong> 繼續聚焦同一題，換問法追問」</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="77" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="judge-%E7%9C%8B%E4%BB%80%E9%BA%BC-%E6%AF%8F%E9%A1%8C%E6%9C%89%E4%B8%8D%E5%90%8C%E7%9A%84-rubric%E6%A0%B9%E6%93%9A%E9%80%90%E5%AD%97%E7%A8%BF%E5%88%A4%E6%96%B7">Judge 看什麼: 每題有不同的 rubric，根據逐字稿判斷</h2>
<p>不同題目有不同的完成標準(rubric)，用小模型根據逐字稿來判斷:</p>
<div class="cols">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">QUESTION_WORKFLOW = [
  { <span class="hljs-string">&quot;title&quot;</span>: <span class="hljs-string">&quot;最近一次使用情境&quot;</span>,
    <span class="hljs-string">&quot;completion_criteria&quot;</span>:
      <span class="hljs-string">&quot;需含最近一次使用的具體情境，&quot;</span>
      <span class="hljs-string">&quot;至少提到使用的功能與當時任務。&quot;</span> },
  { <span class="hljs-string">&quot;title&quot;</span>: <span class="hljs-string">&quot;替代方案&quot;</span>,
    <span class="hljs-string">&quot;completion_criteria&quot;</span>:
      <span class="hljs-string">&quot;需提到至少一個替代方案，&quot;</span>
      <span class="hljs-string">&quot;最好指出最常用者與原因。&quot;</span> },
  <span class="hljs-comment"># …其餘題目</span>
]
</code></pre>
</div>
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">You are a user interview quality reviewer.
Use only the transcript below. Do not infer
facts that are not in the transcript.

Current question: {question}
Completion criteria: {completion_criteria}
Transcript: {transcript}

Return exactly one character:
Y if complete. N if not.
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="78" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%B2%92%E9%81%8E%E6%99%82%E7%9A%84%E5%9B%9E%E5%82%B3%E5%80%BC-%E9%82%84%E6%98%AF%E8%A6%81%E5%8F%AF%E8%A1%8C%E5%8B%95">沒過時的回傳值: 還是要可行動</h2>
<p>Judge 回 N 時，工具不是只回一個 false，而是回一段<strong>可行動的指令</strong>，順便附上這是第幾次被退:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">N: 仍停留在第 1 題「最近一次使用情境」。這是第一次追問。
請換一種問法追問目前這題，不要切換題目。
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="79" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%80%9F-codex-%E7%9A%84%E5%81%9A%E6%B3%95-time_control-%E6%AF%8F%E8%BC%AA%E6%B3%A8%E5%85%A5%E5%8B%95%E6%85%8B%E7%8B%80%E6%85%8B">借 Codex 的做法: time_control 每輪注入動態狀態</h2>
<p>每輪推動 agent 往對的方向走: 「現在過幾分鐘了、第幾題了」的狀態也傳給 Agent</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">&lt;time_control&gt;已過 7 分鐘 / 共 15 分鐘&lt;/time_control&gt;
&lt;current_question&gt;第 2 / 5 題: 題目....&lt;/current_question&gt;
</code></pre>
<div class="small gap-sm">每輪動態注入<strong>當下狀態</strong>，提醒目前在哪一題，以及用這個訊號調節奏:時間充裕就從容追問，時間不夠了就加速減少追問。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="80" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="83" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%82%BA%E4%BB%80%E9%BA%BC%E9%9C%80%E8%A6%81%E5%A4%96%E5%B1%A4%E8%BF%B4%E5%9C%88">為什麼需要外層迴圈?</h2>
<div class="cols gap-sm">
<div class="card">
<h3 id="%E4%B8%89%E7%A8%AE%E6%83%85%E6%B3%81">三種情況</h3>
<ul>
<li><strong>① 單一 context 能力有限</strong>: 大任務得拆段，每段用乾淨 context 重新開始、表現不受前一段影響（塞滿、失敗推理污染、Goal 跨不過 session）</li>
<li><strong>② 是另一個不相關的新任務</strong>: 本來就該各自開乾淨 context，並管理多條平行的 agent</li>
<li><strong>③ 要由外部事件自動觸發</strong>: webhook、新郵件、排程、CI 失敗一來就啟動</li>
</ul>
</div>
<div class="card green">
<h3 id="%E5%85%B1%E5%90%8C%E7%9A%84%E8%A7%A3%E6%B3%95">共同的解法</h3>
<p>需要一個在單輪 agent 之外的工程迴圈，也就是 <strong>外層 harness</strong></p>
<p>它決定何時觸發、每件事開獨立 agent、多條 agent 怎麼協調。</p>
<p>進度不靠 context 記憶，會寫到檔案系統共享。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="84" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%80%9D%E8%B7%AF-%E8%A8%AD%E8%A8%88%E6%8F%90%E7%A4%BA-agent-%E7%9A%84%E8%BF%B4%E5%9C%88">思路: 設計提示 Agent 的迴圈</h2>
<div class="cols">
<div>
<p>這一層最近在社群很熱門:</p>
<ul>
<li>龍蝦爸 Peter Steinberger:「你不該再去提示 agent，你該<strong>設計提示 agent 的迴圈</strong>」講了好幾個月</li>
<li>Claude 的 Boris Cherny、Andrej Karpathy 大神也講過類似的話</li>
<li>最近出現 <strong>loop engineering</strong> 新詞</li>
</ul>
</div>
<div class="card blue">
<h3 id="%E5%85%B7%E9%AB%94%E4%BE%86%E8%AA%AA">具體來說</h3>
<p>其實就是強調 Outer loop (Outer harness) 這一層，讓我們看具體實作案例，拆解給你看</p>
</div>
</div>
<div class="cite">參考: <a href="https://x.com/steipete/status/2063697162748260627">Peter Steinberger</a>: You should be designing loops that prompt your agents.</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="85" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%A4%96%E5%B1%A4-loop-%E7%9A%84%E4%B8%89%E7%A8%AE%E5%AF%A6%E4%BD%9C%E6%A1%88%E4%BE%8B">外層 Loop 的三種實作案例</h2>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="%F0%9F%94%81-ralph"><img class="emoji" draggable="false" alt="🔁" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f501.svg" data-marp-twemoji=""/> Ralph</h3>
<p><strong>bash 蠻力重跑</strong></p>
<p>每圈全新 context，同一份 prompt 反覆送進去直到做完</p>
</div>
<div class="card">
<h3 id="%F0%9F%8E%BC-openai-symphony"><img class="emoji" draggable="false" alt="🎼" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3bc.svg" data-marp-twemoji=""/> OpenAI Symphony</h3>
<p><strong>看板協調器</strong></p>
<p>專案管理工具當控制平面，每張開啟的 ticket 配一個 agent</p>
</div>
<div class="card">
<h3 id="%E2%8F%B0-%E8%87%AA%E5%8B%95%E6%8E%92%E7%A8%8B"><img class="emoji" draggable="false" alt="⏰" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/23f0.svg" data-marp-twemoji=""/> 自動排程</h3>
<p><strong>定時觸發</strong></p>
<p>時間到就跑一輪；依 context 是否沿用，再分「獨立」與「heartbeat」兩種</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="86" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="ralph%E6%9C%80%E7%AC%A8%E4%B9%9F%E6%9C%80%E6%9C%89%E5%90%8D%E7%9A%84-loop">Ralph:最笨也最有名的 Loop</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-keyword">while</span> :; <span class="hljs-keyword">do</span>
  <span class="hljs-built_in">cat</span> PROMPT.md | claude-code
<span class="hljs-keyword">done</span>
</code></pre>
<ul>
<li>一個 bash 無窮迴圈，每圈把同一份 prompt 再送進去一次</li>
<li><strong>每一圈都是全新的 context</strong>:每圈歸零，只從固定幾份檔案重新讀起</li>
<li><strong>完成才跳出</strong>:當 AI 認為所有任務都完成，輸出 <code>COMPLETE</code> 代表完成，就脫離無窮迴圈</li>
</ul>
<div class="cite">出處: <a href="https://ghuntley.com/ralph/">ghuntley.com/ralph</a>（2025 就有了）</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="87" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%B7%A8%E5%9C%88%E8%A8%98%E6%86%B6-%E9%80%B2%E5%BA%A6%E5%85%A8%E9%9D%A0%E5%A4%96%E9%83%A8%E7%8B%80%E6%85%8B">跨圈記憶: 進度全靠外部狀態</h2>
<p>Ralph 拆成三個檔案:</p>
<div class="cols-3">
<div class="card">
<h3 id="%F0%9F%93%9C-git-history"><img class="emoji" draggable="false" alt="📜" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4dc.svg" data-marp-twemoji=""/> git history</h3>
<p>完成的工作就是 commit，</p>
<p>新 agent 開圈先看歷史</p>
</div>
<div class="card">
<h3 id="%F0%9F%93%9D-progresstxt"><img class="emoji" draggable="false" alt="📝" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4dd.svg" data-marp-twemoji=""/> progress.txt</h3>
<p>每圈追加學到的事:</p>
<p>陷阱、模式、決策</p>
</div>
<div class="card">
<h3 id="%E2%98%91%EF%B8%8F-prdjson"><img class="emoji" draggable="false" alt="☑️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2611.svg" data-marp-twemoji=""/> prd.json</h3>
<p>任務清單與 <code>passes</code> 狀態:</p>
<p>每圈挑最高優先且未完成的</p>
</div>
</div>
<div class="card gap-sm">
<p><strong>ralph 的每一圈</strong>:</p>
<p>讀 prd.json／progress.txt → 挑最高優先尚未完成的 story → 只實作這一個 → 跑 typecheck 和測試 → 過了 commit 標記完成 → learning 追加進 progress.txt → 下一圈。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="88" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="89" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="claude-code-%E7%9A%84-ralph-wiggum-plugin-%E5%88%A5%E5%8F%AA%E7%9C%8B%E5%90%8D%E5%AD%97%E8%A6%81%E7%9C%8B%E5%85%A7%E9%83%A8%E5%AF%A6%E4%BD%9C">Claude Code 的 ralph-wiggum Plugin: 別只看名字，要看內部實作</h2>
<p>名字叫 Ralph，但讀完 code，它的機制跟原版不同:</p>
<div class="cols">
<div class="card">
<h3 id="%E5%8E%9F%E7%89%88-ralph">原版 Ralph</h3>
<p>bash 外迴圈，<strong>每圈整個重來</strong>:全新 context、靠檔案傳遞進度。是「<strong>換新 context</strong>」的設計。</p>
</div>
<div class="card blue">
<h3 id="ralph-wiggum-plugin">ralph-wiggum plugin</h3>
<p>用 <strong>Stop hook</strong> 在<strong>同一個 session</strong> 內攔住結束，進行完成判定。</p>
</div>
</div>
<div class="quote">「同一條 thread 延續」＋「完成與否主模型自己決定」＝ 其實是 <strong>Codex /goal</strong> 作法，而不是原版 Ralph。</div>
<div class="cite">參考:<a href="https://github.com/anthropics/claude-code/tree/main/plugins/ralph-wiggum">claude-code/plugins/ralph-wiggum</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="90" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%B0%8D-ralph-%E7%9A%84%E6%89%B9%E8%A9%95">對 Ralph 的批評</h2>
<div class="card red">
<ul>
<li><strong>無狀態重跑</strong>: prompt 每圈不變，progress.txt 只是軟性筆記、缺結構化記憶</li>
<li><strong>暴力跑，收斂困難</strong>: 弱模型的權宜之計，靠大量 token 硬做、可能把關不足</li>
<li><strong>執行成本</strong>: 可能卡住一直耗 token</li>
</ul>
</div>
<div class="quote">心得: 驗證 (goal) 應該在內層 harness 就要做好，而不能只靠外層一直重跑。只依靠外層既耗 token，也很難對大範圍做好驗證。</div>
<div class="cite">參考:Steinberger <a href="https://x.com/steipete/status/2011422781137707112">「slop in a loop」</a>、<a href="https://dev.to/thesystemistsimon/ralph-loop-is-innovative-i-wouldnt-use-it-for-anything-that-matters-4d99">Ralph Loop Is Innovative…</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="91" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="openai-symphony-%E6%8A%8A%E5%B0%88%E6%A1%88%E7%AE%A1%E7%90%86%E7%B3%BB%E7%B5%B1%E8%AE%8A%E6%88%90-agent-%E6%8E%A7%E5%88%B6%E7%B3%BB%E7%B5%B1">OpenAI Symphony: 把專案管理系統變成 Agent 控制系統</h2>
<p>OpenAI 開源的 harness 外層系統(以Spec形式): 以任務為中心，將 Linear 當做控制平面，每張開啟的 ticket 都有一個 agent 在自己工作區跑（有新 ticket 就派工)</p>
<div class="cols gap-sm">
<div class="card">
<h3 id="%E5%B0%88%E6%A1%88%E7%9C%8B%E6%9D%BF%E5%B0%B1%E6%98%AF%E7%8B%80%E6%85%8B%E6%A9%9F">專案看板就是狀態機</h3>
<ul>
<li>ticket 狀態驅動:進 Todo 派 agent、進 Rework 帶 review 重做、進終態收掉</li>
<li>任務 DAG:沒被 block 的就開 agents 平行跑</li>
<li>agent 自己開 ticket、交付 <strong>proof of work</strong> 成果（CI、review、示範影片等）</li>
</ul>
</div>
<div class="card blue">
<h3 id="%E4%BA%BA%E7%AE%A1%E7%90%86%E7%9A%84%E6%98%AF%E5%B7%A5%E4%BD%9C%E4%B8%8D%E6%98%AF-code">人管理的是「工作」，不是 code</h3>
<ul>
<li>有些 ticket 純調查分析，從頭到尾不碰 codebase</li>
<li>Agent 的目標不只是「寫完 code」，而是要「說服人類把這段程式碼合併」</li>
</ul>
</div>
</div>
<div class="cite">參考:OpenAI <a href="https://openai.com/index/open-source-codex-orchestration-symphony/">An open-source spec for Codex orchestration: Symphony</a>（2026/4）</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="92" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="93" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%87%AA%E5%8B%95%E6%8E%92%E7%A8%8Bcron-%E6%9C%80%E8%BC%95%E9%87%8F%E6%9C%80%E9%80%9A%E7%94%A8%E7%9A%84%E8%A7%B8%E7%99%BC">自動排程(cron): 最輕量、最通用的觸發</h2>
<div class="cols">
<div>
<p>設定觸發條件，條件一到就自動把一段 prompt 丟出去跑一輪。</p>
<p>Claude Code、Codex 都已<strong>內建</strong>（<code>/loop</code>、Routines、Automations），設定就能用，是最容易上手的。</p>
</div>
<div class="card">
<h3 id="%E8%A7%B8%E7%99%BC%E7%9A%84%E7%AF%80%E5%A5%8F">觸發的節奏</h3>
<ul>
<li><strong>定時</strong>: cron 排程，時間到就跑</li>
<li><strong>動態</strong>: 讓 agent 自己決定下次何時跑</li>
<li><strong>事件</strong>: webhook、新郵件、CI 失敗才觸發</li>
</ul>
</div>
</div>
<p>例如</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">/loop 5m 檢查 deploy 狀態，失敗就修        ← 固定間隔
/loop 盯著 CI，紅了就處理                  ← 動態間隔：模型自己決定
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="94" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%A8%AD%E8%A8%88%E9%87%8D%E9%BB%9E-%E8%A6%81%E4%B8%8D%E8%A6%81%E6%B2%BF%E7%94%A8-context">設計重點: 要不要沿用 context ?</h2>
<div class="cols gap-sm">
<div class="card">
<h3 id="%E6%AF%8F%E6%AC%A1%E7%8D%A8%E7%AB%8B-context">每次獨立 context</h3>
<p>每次開<strong>全新的 agent</strong>。乾淨 context、進度靠外部狀態。</p>
<p>例如 Codex 的 standalone automation 模式 、Claude Code 的 Routines 功能</p>
</div>
<div class="card blue">
<h3 id="%E6%B2%BF%E7%94%A8-context-heartbeat">沿用 context: Heartbeat</h3>
<p>把 prompt 打到<strong>同一個長駐 session</strong>。記憶連續、反應快，但 context 會持續變大。</p>
<p>例如 Codex 的 thread automation 模式、Claude Code 的 in-session <code>/loop</code>功能</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="95" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="96" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="loop-%E5%92%8C-goal-%E5%8F%AF%E4%BB%A5%E4%B8%80%E8%B5%B7%E7%94%A8">Loop 和 Goal 可以一起用</h2>
<table>
<thead>
<tr>
<th></th>
<th>管什麼</th>
<th>回答的問題</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>外層 Loop</strong></td>
<td>scheduling 排程</td>
<td><strong>什麼時候</strong>跑、多久跑一次</td>
</tr>
<tr>
<td><strong>Goal</strong></td>
<td>termination 終止</td>
<td>做到<strong>什麼程度</strong>才能停</td>
</tr>
</tbody>
</table>
<div class="cols gap-sm">
<div class="card green">
<h3 id="%E4%BD%9C%E6%B3%95%E4%B8%80">作法一</h3>
<p>排程內的 Agent 就直接用上 Goal 把事情做完</p>
</div>
<div class="card">
<h3 id="%E4%BD%9C%E6%B3%95%E4%BA%8C">作法二</h3>
<p>在排程內，把工作丟到某個 queue 就結束。另外有真正做事帶 goal 的 Agent 去執行</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="97" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%A1%88%E4%BE%8B-%E9%BE%8D%E8%9D%A6%E7%88%B8%E7%88%B8%E7%9A%84-loop-%E8%87%AA%E5%8B%95%E7%B6%AD%E8%AD%B7-repo">案例: 龍蝦爸爸的 Loop 自動維護 Repo</h2>
<p>Steinberger 開源的 maintainer-orchestrator skill 每隔 5 分鐘醒來執行</p>
<div class="cols gap-sm">
<div class="card">
<h3 id="%F0%9F%95%B0%EF%B8%8F-cron-%EF%BC%8B-orchestrator-%E5%8D%94%E8%AA%BF%E5%88%86%E9%85%8D%E4%BB%BB%E5%8B%99"><img class="emoji" draggable="false" alt="🕰️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f570.svg" data-marp-twemoji=""/> Cron ＋ Orchestrator 協調分配任務</h3>
<ul>
<li>orchestrator 本身只當<strong>控制平面</strong>:定時檢查、派工、監控、需要時問人決策</li>
<li>每 5 分鐘 <strong>heartbeat</strong> 醒來讀各 worker 現況</li>
<li>實作全部下放給平行跑的 <strong>worker thread</strong>；worker <strong>不准再往下委派</strong></li>
</ul>
</div>
<div class="card blue">
<h3 id="%F0%9F%97%82%EF%B8%8F-%E5%85%88%E9%81%8E%E4%B8%80%E9%81%93-triage-%E5%88%86%E9%A1%9E"><img class="emoji" draggable="false" alt="🗂️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f5c2.svg" data-marp-twemoji=""/> 先過一道 triage 分類</h3>
<p>github-project-triage 把進來的 queue 分三類:</p>
<ul>
<li><strong>Autonomous</strong>:可重現、有界、可驗證 → 直接派工</li>
<li><strong>Needs owner</strong>:產品決策、安全、缺權限</li>
<li><strong>Defer／close</strong>:過期、重複 → 附證據處置</li>
</ul>
</div>
</div>
<div class="cite">出處:<a href="https://x.com/steipete/status/2064998499780084154">@steipete</a>（2026/6），skills 開源於 <a href="https://github.com/steipete/agent-scripts">agent-scripts</a></div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="98" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="98" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E5%A4%96%E5%B1%A4-loop-%E6%A0%B8%E5%BF%83%E4%B8%89%E5%80%8B%E5%95%8F%E9%A1%8C">外層 Loop 核心三個問題</h2>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="1%EF%B8%8F%E2%83%A3-%E6%80%8E%E9%BA%BC%E8%A2%AB%E8%A7%B8%E7%99%BC"><img class="emoji" draggable="false" alt="1️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/31-20e3.svg" data-marp-twemoji=""/> 怎麼被觸發</h3>
<p>固定 cron、動態間隔，還是事件（webhook、新郵件、CI 失敗、看板多一張 ticket）？</p>
</div>
<div class="card">
<h3 id="2%EF%B8%8F%E2%83%A3-%E9%86%92%E4%BE%86%E7%9C%8B%E4%BB%80%E9%BA%BC"><img class="emoji" draggable="false" alt="2️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/32-20e3.svg" data-marp-twemoji=""/> 醒來看什麼</h3>
<p>要讀哪些 context 之外的狀態，才知道進度到哪、有沒有新工作？</p>
<p>例如 Ralph 讀 git／progress.txt、Symphony 讀專案看板等等</p>
</div>
<div class="card">
<h3 id="3%EF%B8%8F%E2%83%A3-%E7%B5%90%E6%9E%9C%E9%80%81%E5%8E%BB%E5%93%AA"><img class="emoji" draggable="false" alt="3️⃣" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/33-20e3.svg" data-marp-twemoji=""/> 結果送去哪</h3>
<p>開 PR、寄一封簡報、丟進 triage 收件匣，還是安靜歸檔？</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="99" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="99" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<p><img src="loopcraft.png" alt="loopcraft: 由內到外五層巢狀迴圈，從 token 到開放探索" style="width:860px;" /></p>
<div class="small center gap-sm">出自 Shawn "swyx" Wang 電子報，其中 loop engineering 最想強調的是第 ④ 層 <strong>MetaLoop</strong>(生迴圈的迴圈)</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="100" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 7 · 進階</span></p>
<h1 id="%E8%87%AA%E6%88%91%E6%94%B9%E9%80%B2%E7%9A%84brharness">自我改進的<br />Harness</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="101" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="101" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%8A%8A%E6%94%B9-harness%E9%80%99%E4%BB%B6%E4%BA%8B%E4%BA%A4%E7%B5%A6-agent">把「改 harness」這件事交給 agent</h2>
<div class="cols">
<div>
<p><strong>連 harness 本身，都讓 agent 自己改。</strong> 讓 agent 根據自己跑出來的 trace 與 eval，回頭改自己的 harness，包括 system prompt, skills 甚至 code 。</p>
<div class="card blue gap-sm">
<p>自我改進不是讓 agent 想改什麼就改什麼</p>
<p>需要在 eval、trace、版本控制、regression test 的限制下，提出可驗證的變更。</p>
<p>不然，「自我改進」和「把 harness 改壞」就分不出來了。</p>
</div>
</div>
<div>
<div class="card">
<h3 id="%F0%9F%93%A1-%E6%96%B9%E6%B3%95%E4%B8%80-%E8%AE%80-production-traces"><img class="emoji" draggable="false" alt="📡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4e1.svg" data-marp-twemoji=""/> 方法一: 讀 Production Traces</h3>
</div>
<div class="card gap-sm">
<h3 id="%F0%9F%94%A7-%E6%96%B9%E6%B3%95%E4%BA%8C-%E7%94%A8-agent-%E7%95%B6%E5%84%AA%E5%8C%96%E5%99%A8%E6%94%B9-code"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f527.svg" data-marp-twemoji=""/> 方法二: 用 Agent 當優化器改 code</h3>
</div>
<div class="card gap-sm">
<h3 id="%F0%9F%93%9A-%E6%96%B9%E6%B3%95%E4%B8%89-self-improving-%E6%94%B9-skills"><img class="emoji" draggable="false" alt="📚" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4da.svg" data-marp-twemoji=""/> 方法三: Self-Improving 改 Skills</h3>
</div>
<div class="small gap-sm">💡 詳見 blog.aihao.tw 文章: 自我改進 Harness, Meta-Harness 與爬坡 </div>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="102" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 8 · 收尾</span></p>
<h1 id="%E6%9C%83%E9%81%8E%E6%9C%9F%E7%9A%84-harness">會過期的 Harness</h1>
<p>Model-Harness-Fit</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="103" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="103" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%A8%A1%E5%9E%8B%E4%B8%80%E5%8D%87%E7%B4%9Aharness-%E6%9C%83%E6%80%8E%E6%A8%A3">模型一升級，harness 會怎樣?</h2>
<div class="cols gap-sm">
<div class="card blue">
<h3 id="%F0%9F%94%97-%E6%B2%92%E6%9C%89%E4%B8%80%E5%A5%97-harness-%E9%81%A9%E7%94%A8%E6%89%80%E6%9C%89%E6%A8%A1%E5%9E%8B"><img class="emoji" draggable="false" alt="🔗" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f517.svg" data-marp-twemoji=""/> 沒有一套 harness 適用所有模型</h3>
<ul>
<li>同一套 harness 換個模型，效果<strong>不一樣</strong></li>
<li>小模型要更複雜精巧的 harness，大模型需要的 harness 可以較輕薄</li>
</ul>
</div>
<div class="card" style="background:#fff8c5;">
<h3 id="%E2%8F%B3-harness-%E6%9C%83%E9%81%8E%E6%9C%9F"><img class="emoji" draggable="false" alt="⏳" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/23f3.svg" data-marp-twemoji=""/> harness 會過期</h3>
<p>模型每次變強，某些當初<strong>補強它的元件</strong>就不再有用，該被移除。</p>
<p>每次升級時可以檢查之前的 prompt 約束、workflow 還有必要嗎？</p>
</div>
</div>
<blockquote>
<p>Terminal-Bench 2.0 排行榜排的不是「模型」，而是「<strong>harness ＋ 模型</strong>」的配對。同一個模型配不同 harness，分數差好幾個百分點，差距甚至大過一個模型世代的升級。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="104" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="104" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%A8%AD%E8%A8%88-harness-%E6%9E%B6%E6%A7%8B%E6%99%82%E6%87%89%E8%80%83%E6%85%AE%E6%A8%A1%E5%9E%8B%E5%8D%87%E7%B4%9A">設計 Harness 架構時，應考慮模型升級</h2>
<div class="cols gap-sm">
<div class="card red">
<h3 id="%E2%8F%B3-%E6%9C%83%E9%81%8E%E6%9C%9F"><img class="emoji" draggable="false" alt="⏳" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/23f3.svg" data-marp-twemoji=""/> 會過期</h3>
<p><strong>各種 harness 做法與補強措施</strong></p>
<p>Bitter Lesson: 能隨算力擴大的通用方法，終究勝過手工規則。很多會隨更強的模型逐步不再需要。</p>
</div>
<div class="card green">
<h3 id="%E2%99%BE%EF%B8%8F-%E4%B8%8D%E6%9C%83%E9%81%8E%E6%9C%9F"><img class="emoji" draggable="false" alt="♾" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/267e.svg" data-marp-twemoji=""/>️ 不會過期</h3>
<p><strong>定義「什麼叫做好」＋ 驗證</strong></p>
<p>就算模型強到能完美自我驗證，它驗證的，仍然是一個「由你定義的目標」。定義什麼是「好」，是無論模型多強都得自己做的核心。</p>
<p>Harness 應該設計得<strong>容易替換元件、更容易測量性能</strong>: 模型一變強，你才拆得掉。</p>
</div>
</div>
<div class="small gap-sm">💡 詳見 blog.aihao.tw 文章: 會過期的 Harness, Model-Harness-Fit 與 Bitter Lesson</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="105" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">PART 9 · 動手做</span></p>
<h1 id="%E8%87%AA%E5%BB%BA-agent-%E7%9A%84br%E6%A1%86%E6%9E%B6%E9%81%B8%E5%9E%8B">自建 Agent 的<br />框架選型</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="106" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="106" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E8%A9%B2%E5%BE%9E%E5%93%AA%E5%80%8B%E9%96%8B%E7%99%BC%E6%A1%86%E6%9E%B6%E9%96%8B%E5%A7%8B">該從哪個開發框架開始?</h2>
<div class="cols gap-sm">
<div class="card blue">
<h3 id="%E8%B7%AF%E7%B7%9A%E4%B8%80-%E5%BE%9E%E5%8A%9F%E8%83%BD%E5%AE%8C%E6%95%B4%E7%9A%84-deep-agent-%E9%96%8B%E5%A7%8B">路線一: 從功能完整的 Deep Agent 開始</h3>
<p><strong>起點高</strong>: 一開始就有能跑的 agent，但相對不好改。</p>
<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 優點</strong>: 馬上能跑；harness 原廠針對自家模型調過。</p>
<p><strong><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> 缺點</strong>: 會帶用不到的 context／工具；可控性／可維護性受限；常綁特定供應商。</p>
</div>
<div class="card">
<h3 id="%E8%B7%AF%E7%B7%9A%E4%BA%8C-%E5%BE%9E%E5%9F%BA%E7%A4%8E%E6%A7%8B%E5%BB%BA">路線二: 從基礎構建</h3>
<p><strong>起點低</strong>: 要自己接的多，但彈性與可控性好，能一步步朝想要的設計走。</p>
<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 優點</strong>: 完全可控，貼著任務分布拿掉無關 context／工具；model 無關、好換供應商、好控成本。</p>
<p><strong><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> 缺點</strong>: 前期工程量較大。</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="107" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="107" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E6%A1%86%E6%9E%B6%E8%88%89%E4%BE%8B">框架舉例</h2>
<div class="cols">
<div class="card blue">
<h3 id="%E8%B7%AF%E7%B7%9A%E4%B8%80-%E5%85%A8%E5%A5%97-deep-agent">路線一: 全套 Deep Agent</h3>
<ul>
<li><a href="https://developers.openai.com/codex/sdk/">Codex SDK / app server</a>）Apache 2.0 開源，可用 ChatGPT 訂閱帳號登入</li>
<li><a href="https://code.claude.com/docs/en/agent-sdk/overview">Claude Agent SDK</a>（Anthropic）核心閉源，第三方只能用 API key</li>
<li><a href="https://github.com/langchain-ai/deepagents">LangChain deepagents</a> MIT 開源</li>
</ul>
</div>
<div class="card">
<h3 id="%E8%B7%AF%E7%B7%9A%E4%BA%8C-%E5%BE%9E%E5%9F%BA%E7%A4%8E%E6%A7%8B%E5%BB%BAopinionated-%E9%AB%98-%E2%86%92-%E4%BD%8E">路線二: 從基礎構建（opinionated 高 → 低）</h3>
<ul>
<li><a href="https://strandsagents.com/">AWS Strands Agents</a></li>
<li><a href="https://adk.dev/">Google ADK</a></li>
<li><a href="https://github.com/microsoft/agent-framework">Microsoft Agent Framework</a></li>
<li><a href="https://openai.github.io/openai-agents-python/">OpenAI Agents SDK</a></li>
<li><a href="https://ai.pydantic.dev/">Pydantic AI</a></li>
<li><a href="https://github.com/langchain-ai/langgraph">LangGraph</a></li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="108" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="108" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E9%82%A3%E5%88%B0%E5%BA%95%E8%A9%B2%E9%81%B8%E5%93%AA%E5%80%8B">那到底該選哪個?</h2>
<div class="cols-3 gap-sm">
<div class="card">
<h3 id="%F0%9F%94%B9-%E7%89%B9%E5%AE%9A%E6%83%85%E5%A2%83%EF%BC%8F%E8%A6%8F%E6%A8%A1%E5%A4%A7"><img class="emoji" draggable="false" alt="🔹" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f539.svg" data-marp-twemoji=""/> 特定情境／規模大</h3>
<p>特定情境，或使用者多 → <strong>從基礎構建</strong>。貼近單一任務分布的 vertical agent 更有效率: token 成本低、延遲低，也能換供應商、精算成本。</p>
</div>
<div class="card">
<h3 id="%F0%9F%94%B9-%E8%87%AA%E7%94%A8%EF%BC%8F%E5%85%A7%E9%83%A8%E9%96%8B%E7%99%BC"><img class="emoji" draggable="false" alt="🔹" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f539.svg" data-marp-twemoji=""/> 自用／內部開發</h3>
<p>要打造團隊用的 harness 與 outer loop → <strong>從現成 deep agent</strong>。</p>
<p>要的本來就是強的通用開發 agent，原廠已調好內層，先有能跑的東西、疊上 outer loop 最快。</p>
</div>
<div class="card blue">
<h3 id="%F0%9F%94%B9-%E6%83%B3%E7%94%A8%E8%A8%82%E9%96%B1%E5%B8%B3%E8%99%9F"><img class="emoji" draggable="false" alt="🔹" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f539.svg" data-marp-twemoji=""/> 想用訂閱帳號</h3>
<p>要讓使用者帶自己的 ChatGPT 帳號 → <strong>看 Codex SDK 或 Codex app server</strong>。</p>
<p>支援訂閱帳號登入，不必 API key 計費；Claude Agent SDK 第三方只能用 API key。</p>
</div>
</div>
<div class="small gap-sm">💡 詳見 blog.aihao.tw 文章: 自建 Agent 的框架選型: 全套 Deep Agent 還是從基礎構建?</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="109" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="kicker">CONCLUSION</span></p>
<h1 id="%E7%B8%BD%E7%B5%90">總結</h1>
<p>Takeaways</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="110" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="110" style="--paginate:true;--theme:default;" data-marpit-pagination-total="111" data-size="16:9">
<h2 id="%E7%B5%A6-agent-%E9%96%8B%E7%99%BC%E8%80%85%E7%9A%84%E9%A7%95%E9%A6%AD%E5%B7%A5%E7%A8%8B-%E7%B3%BB%E5%88%97%E4%B9%9D%E7%AF%87">給 Agent 開發者的駕馭工程 系列九篇</h2>
<ol>
<li><strong>Part 1</strong>｜六項 Deep Agent 能力</li>
<li><strong>Part 2</strong>｜Harness = 在<strong>執行迴圈</strong>裡約束、檢查、修正；agent 要<strong>回饋迴路</strong>，不是完美 prompt</li>
<li><strong>Part 3 · 時機①</strong>｜<strong>工具裡</strong>閉合最小迴圈: 驗證、改寫、回傳值夾帶指示</li>
<li><strong>Part 4 · 時機②</strong>｜<strong>request 之間注入</strong>: 人 steer／interrupt，或程式注入背景工具結果</li>
<li><strong>Part 5 · 時機③</strong>｜<strong>單輪結束</strong>驗收 Goal／Outcomes；三種 judge 不同實作分析</li>
<li><strong>Part 6 · 時機④</strong>｜<strong>外層 Loop</strong> 跨 session: Ralph／Symphony／cron，<strong>把自己移出迴圈</strong></li>
<li><strong>Part 7 · 進階</strong>｜讓 agent <strong>自己改自己的 harness</strong></li>
<li><strong>Part 8 · 收尾</strong>｜Harness <strong>綁模型、會過期</strong>；不過期的是 <strong>Eval 與 Judge</strong></li>
<li><strong>Part 9 · 番外</strong>｜框架兩條路:<strong>全套 Deep Agent／從基礎構建</strong></li>
</ol>
<div class="small gap-sm">📚 歡迎到 <a href="https://blog.aihao.tw">blog.aihao.tw</a> 看全篇內容。</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="111" data-class="cover" data-theme="default" lang="en-US" class="cover" style="--class:cover;--theme:default;" data-size="16:9">
